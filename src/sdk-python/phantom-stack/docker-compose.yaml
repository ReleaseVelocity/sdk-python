services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    working_dir: /app
    command: ["sleep", "infinity"]
    environment:
      # Versioning fallback (no .git in container) and quiet AWS creds for moto.
      SETUPTOOLS_SCM_PRETEND_VERSION: "1.0.0.dev0"
      AWS_DEFAULT_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
