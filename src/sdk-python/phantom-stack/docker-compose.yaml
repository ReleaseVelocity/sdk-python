services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      args:
        STRANDS_VERSION: ${STRANDS_VERSION:-0.0.0}
    image: strands-sdk-python
    container_name: strands-sdk-python
    environment:
      # Dummy AWS creds so boto3-backed tests / moto mocks have a region+creds.
      AWS_DEFAULT_REGION: us-west-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    working_dir: /app
    command: ["sleep", "infinity"]
