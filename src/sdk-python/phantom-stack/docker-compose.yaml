services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    container_name: sdk-python-dev
    environment:
      # Provide test AWS creds so boto3/moto-based tests don't probe for real ones.
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-west-2"
      LOG_LEVEL: "INFO"
    command: ["sleep", "infinity"]
