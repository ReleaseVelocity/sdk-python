services:
  sdk-python:
    image: app
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    environment:
      # Dummy AWS creds so boto3-backed tests/imports never block on real creds
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-west-2"
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
    working_dir: /app
    # Keep the container alive for dev/exec usage
    command: ["sleep", "infinity"]
