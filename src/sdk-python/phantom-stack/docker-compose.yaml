services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    container_name: strands-sdk-python
    environment:
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Keep AWS calls offline-safe; tests use moto to mock AWS.
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
    working_dir: /app
    command: ["sleep", "infinity"]
