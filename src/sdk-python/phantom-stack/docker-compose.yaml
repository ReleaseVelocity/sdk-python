services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    environment:
      # Default fake AWS creds so boto3/moto-based tests have a valid region.
      AWS_DEFAULT_REGION: us-west-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    working_dir: /app
    command: sleep infinity
