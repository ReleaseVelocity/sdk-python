services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    environment:
      SETUPTOOLS_SCM_PRETEND_VERSION: "1.0.0"
      # Default dummy AWS creds so boto3/moto-based tests behave deterministically.
      AWS_DEFAULT_REGION: "us-west-2"
    working_dir: /app
    command: ["sleep", "infinity"]
