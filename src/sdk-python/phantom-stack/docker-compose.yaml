services:
  sdk-python:
    image: strands-sdk
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    environment:
      # Defaults so moto-backed tests have credentials available even outside
      # the moto fixtures; override per-environment as needed.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-west-2}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["sleep", "infinity"]
