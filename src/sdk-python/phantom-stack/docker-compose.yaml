services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    container_name: strands-sdk-python
    working_dir: /app
    # Keep the container alive for interactive dev work / exec
    command: ["sleep", "infinity"]
    environment:
      - HATCH_VCS_PRETEND_VERSION=0.0.0+dev
      # Prevent boto3 from attempting real AWS calls during tests
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=testing
      - AWS_SECRET_ACCESS_KEY=testing
