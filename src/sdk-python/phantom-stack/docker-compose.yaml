services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: sdk-python
    image: sdk-python:latest
    working_dir: /app
    environment:
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0+docker"
      HATCH_VCS_PRETEND_VERSION: "0.0.0+docker"
    command: ["sleep", "infinity"]
