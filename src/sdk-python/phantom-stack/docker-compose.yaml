services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      args:
        STRANDS_VERSION: ${STRANDS_VERSION:-0.0.0+dev}
    image: strands-sdk-python:dev
    working_dir: /app
    command: sleep infinity
    volumes:
      - ../src:/app/src
      - ../tests:/app/tests
      - ../tests_integ:/app/tests_integ
