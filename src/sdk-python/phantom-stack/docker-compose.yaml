services:
  sdk-python:
    image: strands-sdk-python:latest
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    environment:
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Avoid real AWS calls during tests; moto mocks credentials.
      AWS_DEFAULT_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
    command: ["sleep", "infinity"]
