services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    environment:
      - HATCH_VCS_PRETEND_VERSION=0.0.0+dev
      - LOG_LEVEL=INFO
      # Dummy AWS creds so boto3/moto-based tests have a default region available.
      - AWS_DEFAULT_REGION=us-west-2
    command: sleep infinity
