services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    working_dir: /app
    command: ["sleep", "infinity"]
    environment:
      # Used by tests/conftest moto fixtures; harmless defaults for dev.
      AWS_DEFAULT_REGION: us-west-2
