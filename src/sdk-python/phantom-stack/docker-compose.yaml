services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python
    environment:
      # Provide a version so hatch-vcs/setuptools-scm doesn't fail without git tags.
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Keep AWS SDK from probing real credentials/metadata during unit tests.
      AWS_DEFAULT_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
    working_dir: /app
    command: ["sleep", "infinity"]
