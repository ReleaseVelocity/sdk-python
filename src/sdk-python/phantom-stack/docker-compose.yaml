services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    environment:
      # Pretend version for hatch-vcs (no .git available at runtime).
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Default AWS settings so moto-based tests have sane defaults.
      AWS_DEFAULT_REGION: "us-west-2"
    working_dir: /app
    command: ["sleep", "infinity"]
