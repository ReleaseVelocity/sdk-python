services:
  sdk-python:
    image: sdk-python:latest
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: sdk-python
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION_FOR_STRANDS_AGENTS=0.0.0
      - AWS_DEFAULT_REGION=us-west-2
    working_dir: /app
    command: ["sleep", "infinity"]
