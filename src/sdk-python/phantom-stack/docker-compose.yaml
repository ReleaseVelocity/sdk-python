services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    environment:
      # Provide AWS placeholder creds so boto3-based tests/imports don't fail
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-west-2
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
    working_dir: /app
    command: sleep infinity
