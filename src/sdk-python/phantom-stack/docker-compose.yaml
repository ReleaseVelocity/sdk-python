services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    image: strands-sdk-python
    # NOTE: the docker bridge network used by `compose build` has no outbound
    # connectivity. Build the image first with host networking:
    #   sudo docker build --network=host -f phantom-stack/Dockerfile -t strands-sdk-python ..
    # then start with: sudo docker-compose up -d --no-build
    environment:
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Tests use moto; provide dummy AWS creds so boto3 never reaches the network.
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
      AWS_DEFAULT_REGION: "us-east-1"
    working_dir: /app
    command: ["sleep", "infinity"]
