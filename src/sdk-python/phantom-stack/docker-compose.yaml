services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    image: strands-sdk-python:dev
    working_dir: /app
    command: ["sleep", "infinity"]
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0
      # Default AWS region so boto3-backed code paths/tests have a region present.
      - AWS_DEFAULT_REGION=us-east-1
