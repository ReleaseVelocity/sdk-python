services:
  sdk-python:
    container_name: strands-sdk-python
    image: app
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    environment:
      # Pretend version for hatch-vcs (no git context inside container).
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
      # Default AWS region so boto3/moto-based tests have a sane default.
      AWS_DEFAULT_REGION: "us-west-2"
    command: ["sleep", "infinity"]
