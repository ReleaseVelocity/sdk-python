services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: sdk-python
    environment:
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      LOG_LEVEL: "INFO"
      # Dummy AWS creds so boto3/moto-backed tests don't probe real credentials.
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
      AWS_DEFAULT_REGION: "us-east-1"
    working_dir: /app
    command: ["sleep", "infinity"]
