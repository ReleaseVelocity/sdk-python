services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python
    container_name: strands-sdk-python
    environment:
      # Version is git-tag derived via hatch-vcs; pin it for the no-git build.
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Avoid any accidental real AWS calls during tests; moto mocks these.
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
    working_dir: /app
    command: ["sleep", "infinity"]
