services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    container_name: sdk-python
    working_dir: /app
    environment:
      - LOG_LEVEL=INFO
      # Dummy AWS creds so boto3/moto-based tests have a region/creds context.
      - AWS_DEFAULT_REGION=us-west-2
    command: ["sleep", "infinity"]
