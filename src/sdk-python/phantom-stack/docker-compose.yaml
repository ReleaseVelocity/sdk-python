services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    container_name: sdk-python
    environment:
      SETUPTOOLS_SCM_PRETEND_VERSION: "1.0.0"
      # Many tests touch AWS clients via moto; provide dummy creds/region so
      # boto3/botocore never attempt to read real credentials.
      AWS_DEFAULT_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
    command: ["sleep", "infinity"]
