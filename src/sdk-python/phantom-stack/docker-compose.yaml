services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      network: host
      args:
        PKG_VERSION: "0.0.0"
    image: sdk-python:dev
    working_dir: /app
    # Keep the container running so a developer can exec in and run tests/linters.
    command: ["sleep", "infinity"]
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
