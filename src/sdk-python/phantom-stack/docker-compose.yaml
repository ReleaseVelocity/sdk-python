services:
  sdk-python:
    image: app
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    working_dir: /app
    environment:
      # Default AWS region for boto3-based tooling; override as needed.
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-west-2}
    command: ["sleep", "infinity"]
