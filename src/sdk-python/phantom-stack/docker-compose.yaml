services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: sdk-python
    image: sdk-python:dev
    working_dir: /app
    environment:
      # Defaults used by moto-based unit tests; override as needed.
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-west-2"
    command: ["sleep", "infinity"]
