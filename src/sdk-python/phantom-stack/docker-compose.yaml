services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    container_name: sdk-python
    environment:
      - HATCH_VCS_PRETEND_VERSION=0.0.0
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0
      - PYTHONUNBUFFERED=1
      # Dummy AWS creds so boto3-based tests/imports never reach real AWS.
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-west-2
    working_dir: /app
    # Keep the container alive for interactive development / exec.
    command: ["tail", "-f", "/dev/null"]
