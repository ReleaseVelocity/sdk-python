services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    working_dir: /app
    environment:
      # Provide a deterministic version for hatch-vcs (no .git in tree).
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Dummy AWS creds so boto3-based tests that don't use moto don't hang.
      AWS_DEFAULT_REGION: "us-west-2"
    command: ["sleep", "infinity"]
