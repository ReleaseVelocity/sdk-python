services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    container_name: sdk-python
    working_dir: /app
    environment:
      - LOG_LEVEL=INFO
      # Provide a deterministic version so hatch-vcs does not need git history.
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0
    command: ["sleep", "infinity"]
