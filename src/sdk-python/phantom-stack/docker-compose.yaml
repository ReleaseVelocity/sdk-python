services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    working_dir: /app
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0
      # Avoid real AWS calls during tests; moto mocks AWS.
      - AWS_ACCESS_KEY_ID=testing
      - AWS_SECRET_ACCESS_KEY=testing
      - AWS_DEFAULT_REGION=us-east-1
    command: sleep infinity
