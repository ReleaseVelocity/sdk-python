services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python
    working_dir: /app
    command: ["sleep", "infinity"]
    environment:
      # Test fixtures use moto; provide dummy AWS creds/region so boto3/moto
      # never attempt real network calls during unit tests.
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-west-2
