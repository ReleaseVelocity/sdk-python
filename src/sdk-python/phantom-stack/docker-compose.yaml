services:
  sdk-python:
    image: app
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    working_dir: /app
    environment:
      # Pretend version for hatch-vcs (no git history in container).
      SETUPTOOLS_SCM_PRETEND_VERSION: "1.0.0"
      # Dummy AWS creds so boto3/moto-based tests don't probe real credentials.
      AWS_DEFAULT_REGION: us-west-2
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
    command: sleep infinity
