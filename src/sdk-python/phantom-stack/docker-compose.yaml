services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: app
    container_name: strands-sdk-python
    working_dir: /app
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION=1.0.0
      - LOG_LEVEL=INFO
      # Dummy AWS creds so boto3-based tests that don't use moto don't hang
      - AWS_DEFAULT_REGION=us-west-2
    command: sleep infinity
