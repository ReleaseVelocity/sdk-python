services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python
    working_dir: /app
    command: sleep infinity
    environment:
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
      # Avoid real AWS calls; tests use moto/mocks.
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
      AWS_DEFAULT_REGION: "us-east-1"
