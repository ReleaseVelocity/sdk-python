services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    working_dir: /app
    command: sleep infinity
    environment:
      # AWS creds so boto3/moto-based tests have a valid (fake) config.
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_DEFAULT_REGION: us-west-2
      HATCH_VCS_PRETEND_VERSION: 0.0.0+local
