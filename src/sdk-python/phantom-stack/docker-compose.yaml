services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    environment:
      # hatch-vcs fallback version (no git tags available in this tree).
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Avoid real AWS calls; tests mock these but provide safe defaults.
      AWS_DEFAULT_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
    working_dir: /app
    command: ["sleep", "infinity"]
