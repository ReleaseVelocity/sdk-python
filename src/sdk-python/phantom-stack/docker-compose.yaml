services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: app
    container_name: strands-sdk-python
    working_dir: /app
    environment:
      # hatch-vcs version fallback (no git tags guaranteed in container)
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Strands telemetry / providers expect credentials; tests use moto mocks
      AWS_DEFAULT_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
    command: ["sleep", "infinity"]
