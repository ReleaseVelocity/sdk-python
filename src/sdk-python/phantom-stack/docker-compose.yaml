services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    container_name: strands-sdk-python
    working_dir: /app
    environment:
      # Ensure editable install version resolves without git metadata.
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # moto / boto3 default test credentials + region so the SDK can import cleanly.
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-west-2"
    command: ["sleep", "infinity"]
