services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      network: host
      args:
        PKG_VERSION: "0.0.0"
    image: sdk-python-app
    container_name: sdk-python
    working_dir: /app
    command: ["sleep", "infinity"]
    environment:
      # Default AWS test creds so moto-backed tests have a sane environment.
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-west-2"
      LOG_LEVEL: "INFO"
