services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      args:
        PACKAGE_VERSION: "0.0.0"
    image: strands-sdk-python:dev
    working_dir: /app
    environment:
      - AWS_DEFAULT_REGION=us-west-2
      - LOG_LEVEL=INFO
    command: ["sleep", "infinity"]
