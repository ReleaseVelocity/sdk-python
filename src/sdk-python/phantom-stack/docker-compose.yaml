services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    environment:
      # Provide dummy AWS creds/region so boto3 clients can be constructed
      # in tests even outside moto-mocked fixtures.
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-west-2"
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
    working_dir: /app
    command: ["sleep", "infinity"]
