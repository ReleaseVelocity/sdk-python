services:
  sdk-python:
    image: strands-sdk-python:latest
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      args:
        # No .git in the build context; pin a placeholder dev version so the
        # hatch-vcs build backend can resolve a version.
        HATCH_VCS_PRETEND_VERSION: "0.0.0"
    container_name: strands-sdk-python
    working_dir: /app
    command: sleep infinity
