services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk
    container_name: strands-sdk-python
    working_dir: /app
    command: ["sleep", "infinity"]
    environment:
      # Sensible defaults for moto-backed tests; no real AWS calls are made.
      AWS_DEFAULT_REGION: us-west-2
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
