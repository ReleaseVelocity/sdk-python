services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    image: strands-sdk-python
    working_dir: /app
    command: ["sleep", "infinity"]
    environment:
      # Tests use moto for AWS mocking; provide dummy credentials/region so
      # boto3 clients can be instantiated during collection/runtime.
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-west-2"
