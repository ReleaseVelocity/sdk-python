services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python
    working_dir: /app
    command: sleep infinity
    environment:
      # Avoid AWS credential lookups during unit tests; moto mocks AWS calls.
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=testing
      - AWS_SECRET_ACCESS_KEY=testing
