services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    container_name: strands-sdk-python
    working_dir: /app
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0
      # Prevent any test from making real AWS calls
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=testing
      - AWS_SECRET_ACCESS_KEY=testing
    command: ["sleep", "infinity"]
