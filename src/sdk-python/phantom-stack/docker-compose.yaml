services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: app
    container_name: strands-sdk-python
    working_dir: /app
    command: ["sleep", "infinity"]
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0
      # Dummy AWS creds so boto3/moto-based tests have a region/credentials context.
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=testing
      - AWS_SECRET_ACCESS_KEY=testing
