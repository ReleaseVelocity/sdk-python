services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python
    environment:
      # hatch-vcs / setuptools_scm version fallback (no .git in context)
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # moto-based unit tests use dummy AWS creds
      AWS_DEFAULT_REGION: "us-west-2"
    working_dir: /app
    command: sleep infinity
