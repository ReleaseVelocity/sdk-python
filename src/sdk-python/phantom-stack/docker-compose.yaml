services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    container_name: strands-sdk-python
    working_dir: /app
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION=1.0.0
      # Dummy AWS creds so any code path that constructs a boto3 client offline
      # (tests use moto) has a region/credentials available.
      - AWS_DEFAULT_REGION=us-west-2
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    command: sleep infinity
