services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: app
    container_name: strands-sdk-python
    environment:
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
      # Tests use moto / fake creds; avoid real AWS calls.
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
      AWS_DEFAULT_REGION: "us-east-1"
    working_dir: /app
    command: sleep infinity
