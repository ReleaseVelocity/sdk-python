services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: phantom-stack-sdk-python
    container_name: strands-sdk-python
    environment:
      # Required because hatch-vcs cannot read a git tag inside the container.
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Dummy AWS creds so boto3/moto-based unit tests have a region/credentials.
      AWS_DEFAULT_REGION: "us-west-2"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
    volumes:
      # Mount source for live editing; the editable install picks up changes.
      - ../src:/app/src
      - ../tests:/app/tests
      - ../tests_integ:/app/tests_integ
    command: sleep infinity
