services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      args:
        SETUPTOOLS_SCM_PRETEND_VERSION: ${SETUPTOOLS_SCM_PRETEND_VERSION:-0.0.0}
    container_name: sdk-python
    image: strands-sdk-python:dev
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION=${SETUPTOOLS_SCM_PRETEND_VERSION:-0.0.0}
    working_dir: /app
    command: ["sleep", "infinity"]
