services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0
      # Test/AWS defaults so moto-backed tests have a region/creds available.
      - AWS_DEFAULT_REGION=us-west-2
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    working_dir: /app
    command: ["sleep", "infinity"]
