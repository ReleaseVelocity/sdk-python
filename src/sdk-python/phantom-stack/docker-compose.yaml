services:
  sdk-python:
    image: app
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      network: host
    container_name: strands-sdk-python
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION=1.0.0.dev0
      # Default AWS creds for moto-based tests (overridable)
      - AWS_DEFAULT_REGION=us-west-2
    command: ["sleep", "infinity"]
