services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    working_dir: /app
    environment:
      # Pretend version for hatch-vcs at runtime as well.
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
      # Dummy AWS creds so boto3/moto-based tests have a region available.
      AWS_DEFAULT_REGION: "us-west-2"
    command: ["sleep", "infinity"]
