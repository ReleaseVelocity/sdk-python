services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: app
    container_name: strands-sdk-python
    working_dir: /app
    environment:
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
      # Dummy AWS credentials so boto3-based tests that don't use moto fixtures
      # still have a defined environment.
      AWS_DEFAULT_REGION: "us-west-2"
    command: ["sleep", "infinity"]
