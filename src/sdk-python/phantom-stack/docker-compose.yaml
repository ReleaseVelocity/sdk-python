services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    container_name: sdk-python-dev
    working_dir: /app
    environment:
      # Tests use moto; provide dummy AWS creds so boto3 never reaches AWS.
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_DEFAULT_REGION: us-west-2
    command: ["tail", "-f", "/dev/null"]
