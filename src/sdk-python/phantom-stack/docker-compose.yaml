services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    image: strands-sdk-python:dev
    working_dir: /app
    # Keep the container running so a developer can exec in and run
    # tests, linters (ruff/mypy), or any project command.
    command: ["sleep", "infinity"]
    environment:
      - HATCH_VCS_PRETEND_VERSION=0.0.0
      - PYTHONUNBUFFERED=1
