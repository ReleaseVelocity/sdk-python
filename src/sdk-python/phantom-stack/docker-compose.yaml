services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python-app
    container_name: sdk-python
    environment:
      # hatch-vcs/setuptools-scm has no git tags in the container; pin a version.
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Default AWS creds used by moto-based unit tests.
      AWS_DEFAULT_REGION: "us-west-2"
    working_dir: /app
    command: sleep infinity
