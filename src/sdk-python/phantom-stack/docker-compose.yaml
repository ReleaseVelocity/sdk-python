services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    working_dir: /app
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0
      - LOG_LEVEL=DEBUG
    command: ["sleep", "infinity"]
