services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python
    working_dir: /app
    command: ["sleep", "infinity"]
    environment:
      # Tests rely on moto-mocked AWS; provide dummy credentials/region so any
      # boto3 client construction at import/collection time succeeds.
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-west-2"
