services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python
    container_name: strands-sdk-python
    environment:
      # hatch-vcs needs a version since there is no git history baked in.
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Default AWS creds for moto-based tests that touch boto3.
      AWS_DEFAULT_REGION: us-west-2
    working_dir: /app
    command: ["sleep", "infinity"]
