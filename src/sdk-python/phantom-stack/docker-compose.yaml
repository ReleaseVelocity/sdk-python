services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    working_dir: /app
    command: ["sleep", "infinity"]
    environment:
      - HATCH_VCS_PRETEND_VERSION=0.0.0.dev0
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0.dev0
      # AWS credentials are read from env at runtime; moto mocks them in tests.
      - AWS_DEFAULT_REGION=us-east-1
