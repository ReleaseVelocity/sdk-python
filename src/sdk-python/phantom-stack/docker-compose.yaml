services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    container_name: strands-sdk-python
    environment:
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
      # Prevent any test from accidentally hitting real AWS endpoints.
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
    working_dir: /app
    command: sleep infinity
