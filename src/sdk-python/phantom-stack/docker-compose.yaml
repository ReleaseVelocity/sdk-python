services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    container_name: strands-sdk-python
    environment:
      # Tests use moto to mock AWS; provide dummy credentials/region so the
      # boto3/botocore clients can initialize without real AWS access.
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_DEFAULT_REGION: us-west-2
      LOG_LEVEL: INFO
    working_dir: /app
    command: ["sleep", "infinity"]
