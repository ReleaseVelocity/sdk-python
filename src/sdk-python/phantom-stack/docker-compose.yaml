services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    container_name: strands-sdk-python
    environment:
      # Provide a deterministic version since there is no git history.
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Dummy AWS creds so boto3-backed tests (mocked via moto) behave.
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-west-2"
    working_dir: /app
    command: ["sleep", "infinity"]
