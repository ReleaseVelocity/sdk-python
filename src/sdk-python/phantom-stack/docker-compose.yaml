services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python
    environment:
      # No real AWS creds needed for unit tests (moto mocks AWS), but provide
      # harmless defaults so boto3 has a region.
      AWS_DEFAULT_REGION: us-east-1
      HATCH_VCS_PRETEND_VERSION: 0.0.0+dev
    working_dir: /app
    command: sleep infinity
