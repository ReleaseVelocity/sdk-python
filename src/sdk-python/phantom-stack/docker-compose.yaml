services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: app
    container_name: strands-sdk-python
    environment:
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Avoid real AWS calls during unit tests; moto handles mocking.
      AWS_DEFAULT_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
    working_dir: /app
    command: ["sleep", "infinity"]
