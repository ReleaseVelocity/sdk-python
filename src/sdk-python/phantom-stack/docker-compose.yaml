services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    working_dir: /app
    environment:
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0+docker"
      PYTHONUNBUFFERED: "1"
      # Strands talks to model providers (Bedrock, etc.) at runtime. No real
      # credentials are baked in; supply them via the environment if needed.
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
    command: ["sleep", "infinity"]
