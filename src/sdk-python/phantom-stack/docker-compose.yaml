services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python
    environment:
      # Provide a deterministic version since the checkout has no git tags.
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Used by tests/conftest.py moto fixtures.
      AWS_DEFAULT_REGION: "us-west-2"
    working_dir: /app
    command: ["sleep", "infinity"]
