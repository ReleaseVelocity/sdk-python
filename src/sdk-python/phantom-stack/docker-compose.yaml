services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-agents-sdk-python:dev
    container_name: strands-sdk-python
    environment:
      # hatch-vcs version fallback (no git tags in this context)
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
      # Dummy AWS creds so boto3/moto-based tests that touch credentials behave.
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-west-2"
    working_dir: /app
    command: ["sleep", "infinity"]
