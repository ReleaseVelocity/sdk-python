services:
  sdk-python:
    image: app
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      args:
        SETUPTOOLS_SCM_PRETEND_VERSION: "1.0.0"
    container_name: strands-sdk-python
    environment:
      # hatch-vcs version pretend (no .git in container)
      SETUPTOOLS_SCM_PRETEND_VERSION: "1.0.0"
      # Dummy AWS creds so boto3/moto-based tests have a region/credentials.
      AWS_DEFAULT_REGION: "us-west-2"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
    working_dir: /app
    command: ["sleep", "infinity"]
