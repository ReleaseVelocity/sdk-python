services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      network: host
      args:
        SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
    image: sdk-python
    working_dir: /app
    environment:
      # Defaults used by tests/moto so AWS clients never reach the network.
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-west-2"
      LOG_LEVEL: "INFO"
    command: ["sleep", "infinity"]
