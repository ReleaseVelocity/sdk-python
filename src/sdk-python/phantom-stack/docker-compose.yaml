services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    working_dir: /app
    environment:
      # setuptools_scm pretend version so editable install / version resolution works
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      LOG_LEVEL: "DEBUG"
    # Keep the container alive so developers can exec in and run tests/linters
    command: ["sleep", "infinity"]
