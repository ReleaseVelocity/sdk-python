services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python
    container_name: strands-sdk-python
    environment:
      SETUPTOOLS_SCM_PRETEND_VERSION: "1.0.0"
      # Dummy AWS creds so boto3-backed tests/imports don't fail on credential lookup.
      AWS_DEFAULT_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
    working_dir: /app
    command: ["sleep", "infinity"]
