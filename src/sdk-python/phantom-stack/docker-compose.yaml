services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:latest
    container_name: sdk-python
    environment:
      HATCH_VCS_PRETEND_VERSION: "0.0.0.dev0"
      AWS_DEFAULT_REGION: "us-west-2"
    working_dir: /app
    command: ["sleep", "infinity"]
