services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python
    environment:
      # Provide dummy AWS creds/region so boto3-based imports/tests behave.
      AWS_DEFAULT_REGION: us-west-2
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
    working_dir: /app
    command: sleep infinity
