services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      network: host
    image: app
    container_name: strands-sdk-python
    environment:
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0+dev"
      # Default AWS creds so boto3/moto-based tests have a region/credentials.
      AWS_DEFAULT_REGION: us-west-2
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
    command: sleep infinity
