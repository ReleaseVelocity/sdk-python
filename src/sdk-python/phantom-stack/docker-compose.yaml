services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    container_name: strands-sdk-python
    environment:
      # hatch-vcs/setuptools_scm has no git metadata in the image, so pin a version
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
    working_dir: /app
    command: ["sleep", "infinity"]
