services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: phantom-stack-sdk-python
    container_name: strands-sdk-python
    working_dir: /app
    environment:
      # Avoid real AWS calls; tests use moto mocks but a region is convenient.
      AWS_DEFAULT_REGION: us-west-2
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
    command: ["sleep", "infinity"]
