services:
  sdk:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      network: host
    container_name: strands-sdk-python
    environment:
      - HATCH_VCS_PRETEND_VERSION=0.0.0.dev0
      # Tests use moto and never hit real AWS, but boto3 wants a region.
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=testing
      - AWS_SECRET_ACCESS_KEY=testing
    working_dir: /app
    command: ["sleep", "infinity"]
