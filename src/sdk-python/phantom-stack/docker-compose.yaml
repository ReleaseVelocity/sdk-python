services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    working_dir: /app
    command: ["sleep", "infinity"]
    environment:
      # AWS credentials are not required to collect/run unit tests (moto mocks them),
      # but provide sane placeholders so boto3 imports cleanly.
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
