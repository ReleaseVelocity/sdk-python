services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python
    working_dir: /app
    environment:
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Disable real AWS calls during tests; moto/mocks are used instead.
      AWS_DEFAULT_REGION: "us-west-2"
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
    command: ["sleep", "infinity"]
