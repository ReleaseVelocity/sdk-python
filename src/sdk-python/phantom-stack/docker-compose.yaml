services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      args:
        SETUPTOOLS_SCM_PRETEND_VERSION: "1.0.0.dev0"
    image: strands-sdk-python:dev
    working_dir: /app
    command: ["sleep", "infinity"]
    environment:
      - LOG_LEVEL=INFO
      # Default fake AWS creds so boto3-based tests/imports never hang on
      # credential discovery. Override with real values if needed.
      - AWS_DEFAULT_REGION=us-west-2
