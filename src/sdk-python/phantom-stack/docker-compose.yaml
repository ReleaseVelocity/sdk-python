services:
  sdk-python:
    image: sdk-python-app
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: sdk-python
    working_dir: /app
    command: ["sleep", "infinity"]
    environment:
      # Defaults used by the test suite (moto mocks AWS). These can be
      # overridden per-environment.
      AWS_DEFAULT_REGION: us-west-2
      LOG_LEVEL: INFO
