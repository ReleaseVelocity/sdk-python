services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    working_dir: /app
    # Keep the container running so a developer can exec in and run tests,
    # linters, type checks, etc.
    command: ["sleep", "infinity"]
    environment:
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Avoid real AWS calls; tests use moto / mocks.
      AWS_DEFAULT_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
