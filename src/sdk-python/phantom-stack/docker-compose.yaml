services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    working_dir: /app
    # Keep the container running so a developer can exec in and run tests/linters.
    command: ["sleep", "infinity"]
    environment:
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.1.0"
