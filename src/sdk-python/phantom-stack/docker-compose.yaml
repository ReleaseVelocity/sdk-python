services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python
    working_dir: /app
    command: ["sleep", "infinity"]
    environment:
      # setuptools_scm/hatch-vcs pretend version (no git tags available)
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Dummy AWS creds so boto3/moto-based tests behave deterministically.
      AWS_DEFAULT_REGION: "us-west-2"
