services:
  sdk-python:
    image: app
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    environment:
      # hatch-vcs has no git history in the container, so pin a version.
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Dummy AWS creds/region so boto3/moto-based tests have a sane default.
      AWS_DEFAULT_REGION: "us-west-2"
    volumes:
      # Mount source for live development; exclude the editable egg-info/build.
      - ../src:/app/src
      - ../tests:/app/tests
      - ../tests_integ:/app/tests_integ
      - ../pyproject.toml:/app/pyproject.toml
    working_dir: /app
    # Keep the container alive so a developer can exec in and run tests/linters.
    command: ["sleep", "infinity"]
