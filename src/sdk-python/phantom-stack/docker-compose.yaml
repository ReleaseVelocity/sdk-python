services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    working_dir: /app
    # Keep the container alive so a developer can exec in and run tests/linters.
    command: ["sleep", "infinity"]
    tty: true
    stdin_open: true
