services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    image: strands-sdk-python:dev
    working_dir: /app
    # AWS creds used by tests are mocked via moto; provide harmless defaults so
    # boto3 client construction never blocks on missing credentials.
    environment:
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_DEFAULT_REGION: us-west-2
    command: ["sleep", "infinity"]
