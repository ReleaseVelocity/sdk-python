services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      args:
        SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
    image: strands-sdk-python:dev
    working_dir: /app
    environment:
      # Tests use moto; provide dummy AWS creds so boto3 never reaches AWS.
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
      AWS_DEFAULT_REGION: "us-east-1"
      LOG_LEVEL: "INFO"
    command: ["sleep", "infinity"]
