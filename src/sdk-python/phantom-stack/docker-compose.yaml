services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0
      - LOG_LEVEL=INFO
      # Default fake AWS creds so boto3-based tests/mocks don't probe real creds.
      - AWS_DEFAULT_REGION=us-west-2
    working_dir: /app
    command: sleep infinity
