services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: app
    container_name: sdk-python
    environment:
      - HATCH_VCS_PRETEND_VERSION=0.0.0
      # Dummy AWS creds so boto3 client construction in tests never reaches the network.
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-west-2
    working_dir: /app
    command: sleep infinity
