services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk
    container_name: strands-sdk-python
    environment:
      # Dummy AWS creds so boto3 clients can initialize during tests.
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-west-2"
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
    working_dir: /app
    command: ["sleep", "infinity"]
    tty: true
    stdin_open: true
