services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: app
    container_name: strands-sdk-python
    environment:
      # hatch-vcs version (no .git in the build context).
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Dummy AWS creds so boto3-based tests that don't use moto don't hang.
      AWS_DEFAULT_REGION: us-west-2
    working_dir: /app
    command: sleep infinity
