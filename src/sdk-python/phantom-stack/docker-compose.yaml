services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0
      - AWS_DEFAULT_REGION=us-west-2
    working_dir: /app
    # Keep the container alive so a developer can exec in and run tests/linters.
    command: ["sleep", "infinity"]
