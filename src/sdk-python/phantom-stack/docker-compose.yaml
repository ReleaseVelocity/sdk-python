services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: sdk-python
    image: sdk-python:latest
    environment:
      # Default AWS creds so boto3/moto-based tests have something to read.
      AWS_DEFAULT_REGION: us-west-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      LOG_LEVEL: INFO
    working_dir: /app
    command: sleep infinity
