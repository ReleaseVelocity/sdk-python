services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: app
    container_name: strands-sdk-python
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0
      - HATCH_VCS_PRETEND_VERSION=0.0.0
      # Dummy AWS creds so boto3-based tests have a default region available.
      - AWS_DEFAULT_REGION=us-west-2
    working_dir: /app
    command: sleep infinity
