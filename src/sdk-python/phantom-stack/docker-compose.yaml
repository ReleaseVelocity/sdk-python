services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python
    container_name: strands-sdk-python
    working_dir: /app
    environment:
      # Mocked AWS credentials so boto3/moto-based tests have a default region.
      AWS_DEFAULT_REGION: us-west-2
      LOG_LEVEL: INFO
    command: ["sleep", "infinity"]
