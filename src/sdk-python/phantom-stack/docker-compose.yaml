services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    container_name: sdk-python
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0
    working_dir: /app
    # Keep the container alive for interactive development/testing.
    command: ["sleep", "infinity"]
