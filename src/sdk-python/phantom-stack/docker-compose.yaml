services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python
    environment:
      # AWS credentials are mocked by moto in the unit tests; provide defaults
      # so any boto3 client construction during collection doesn't fail.
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-west-2
    working_dir: /app
    command: ["sleep", "infinity"]
