services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: sdk-python
    image: sdk-python:dev
    environment:
      # hatch-vcs pretend version (no git repo present in the source tree)
      HATCH_VCS_PRETEND_VERSION: "0.0.0+dev"
      # Dummy AWS creds so boto3-based tests/imports never hit real endpoints.
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-west-2"
    command: ["sleep", "infinity"]
