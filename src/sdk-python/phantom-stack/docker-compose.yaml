services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: app
    container_name: strands-sdk-python
    environment:
      # Avoid AWS calls during tests; moto mocks these. Provide harmless defaults.
      AWS_DEFAULT_REGION: us-east-1
      AWS_REGION: us-east-1
      HATCH_VCS_PRETEND_VERSION: 0.0.0+dev
    working_dir: /app
    command: ["sleep", "infinity"]
