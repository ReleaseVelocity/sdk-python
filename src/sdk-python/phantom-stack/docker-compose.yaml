services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: app
    container_name: strands-sdk-python
    working_dir: /app
    # Mount the project source for live development (editable install picks up changes)
    volumes:
      - ../src:/app/src
      - ../tests:/app/tests
      - ../tests_integ:/app/tests_integ
    environment:
      # Dummy AWS creds so boto3/moto-based tests don't try real calls
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-west-2
      - LOG_LEVEL=INFO
    command: ["sleep", "infinity"]
