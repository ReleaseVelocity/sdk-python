services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:latest
    container_name: sdk-python
    environment:
      - HATCH_VCS_PRETEND_VERSION=0.0.0
      # AWS region default so boto3-backed code paths have a region in tests.
      - AWS_DEFAULT_REGION=us-east-1
    working_dir: /app
    command: ["sleep", "infinity"]
