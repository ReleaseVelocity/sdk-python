services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    image: strands-sdk-python:dev
    environment:
      # hatch-vcs version fallback (no .git in context)
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0+docker"
      # Moto-friendly dummy AWS creds so test fixtures / SDK imports never block.
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-west-2"
    working_dir: /app
    command: sleep infinity
