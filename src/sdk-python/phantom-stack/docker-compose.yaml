services:
  sdk-python:
    image: app
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: sdk-python
    environment:
      # Provide dummy AWS creds so boto3-based tests that touch config don't fail.
      AWS_DEFAULT_REGION: us-west-2
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
    working_dir: /app
    command: ["sleep", "infinity"]
