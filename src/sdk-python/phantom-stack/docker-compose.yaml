services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    image: strands-sdk-python:latest
    working_dir: /app
    environment:
      # Satisfy hatch-vcs version resolution (no .git in context)
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
      # moto/boto fake creds so unit tests that touch AWS clients work offline
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-west-2"
    command: ["sleep", "infinity"]
