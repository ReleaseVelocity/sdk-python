services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    image: strands-sdk-python:dev
    environment:
      # Tests use moto/mocks; avoid accidental real AWS calls.
      AWS_DEFAULT_REGION: us-west-2
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
    working_dir: /app
    # Keep the container alive for interactive development / exec.
    command: ["tail", "-f", "/dev/null"]
