services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python-dev
    container_name: sdk-python-dev
    environment:
      # Credentials are stubbed for tests (moto intercepts AWS calls).
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-west-2}
    working_dir: /app
    command: ["sleep", "infinity"]
