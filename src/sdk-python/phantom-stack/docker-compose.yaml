services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    working_dir: /app
    # Mount the source tree for live development (editable install picks up changes).
    volumes:
      - ../src:/app/src
      - ../tests:/app/tests
      - ../tests_integ:/app/tests_integ
    environment:
      - LOG_LEVEL=INFO
      - HATCH_VCS_PRETEND_VERSION=0.0.0
    command: ["sleep", "infinity"]
