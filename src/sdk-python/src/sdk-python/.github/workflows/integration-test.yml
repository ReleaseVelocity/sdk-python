name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Bind to the manual-approval GitHub Environment so environment-scoped
    # secrets (notably STRANDS_INTEG_TEST_ROLE) are exposed to the job.
    # Without this binding, secrets.STRANDS_INTEG_TEST_ROLE expands to an
    # empty string for pull_request_target / merge_group events and the
    # aws-actions/configure-aws-credentials step retries 12 times before
    # failing with "Could not load credentials from any providers".
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are set
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error title=Missing required secret::STRANDS_INTEG_TEST_ROLE is empty. \
          Configure it on the 'manual-approval' GitHub Environment \
          (Settings → Environments → manual-approval → Environment secrets) \
          with a valid IAM role ARN, or grant the secret access to this trigger context."
            exit 1
          fi
          echo "STRANDS_INTEG_TEST_ROLE is set; proceeding to Configure Credentials."

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
