name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    # Skip on Dependabot pull_request_target runs: GitHub does not expose
    # repository / environment Actions secrets to the dependabot context
    # (only the Dependabot secret scope), so secrets.STRANDS_INTEG_TEST_ROLE
    # resolves to an empty string and aws-actions/configure-aws-credentials
    # deterministically fails with "Could not load credentials from any
    # providers" after exhausting its 12 retries. The integration test
    # gate will run via merge_group before merge instead.
    if: >-
      github.event_name != 'pull_request_target' ||
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
