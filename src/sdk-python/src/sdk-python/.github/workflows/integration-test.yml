name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # The STRANDS_INTEG_TEST_ROLE secret is configured on the `manual-approval`
    # GitHub Environment. Without this `environment:` declaration the secret is
    # not injected into the job, causing `aws-actions/configure-aws-credentials`
    # to receive an empty `role-to-assume` and fail after exhausting all
    # provider-chain credential retries.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Validate required secrets
        # Fail fast (1s) with a clear message instead of letting
        # configure-aws-credentials spend ~75s exhausting credential-provider
        # retries when the role secret is missing or empty.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Missing STRANDS_INTEG_TEST_ROLE secret. Verify it is defined on the 'manual-approval' GitHub Environment (or as a repository secret) and that this job declares 'environment: manual-approval'."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
