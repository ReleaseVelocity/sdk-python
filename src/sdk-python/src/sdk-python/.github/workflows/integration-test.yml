name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integration-test role secret is available
        # Fail fast with a clear message when STRANDS_INTEG_TEST_ROLE is not
        # exposed to this run (e.g. pull_request_target triggered by a
        # Dependabot or fork PR without an environment that grants the secret).
        # Without this guard, configure-aws-credentials below receives an
        # empty role-to-assume, falls back to the default AWS provider chain,
        # and burns ~74s on 12 OIDC retries before emitting an opaque
        # "Could not load credentials from any providers" error.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Secret STRANDS_INTEG_TEST_ROLE is not available in this run's context."
            echo "This typically means the workflow was triggered by a Dependabot PR or an external fork PR via pull_request_target,"
            echo "where repository secrets are not exposed unless the job is gated through a GitHub Environment that grants them."
            echo "Remediation options:"
            echo "  1) Attach this job to a GitHub Environment (e.g. 'manual-approval') that exposes STRANDS_INTEG_TEST_ROLE, or"
            echo "  2) Add STRANDS_INTEG_TEST_ROLE to Dependabot secrets (Settings -> Secrets and variables -> Dependabot) for Dependabot PRs."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
