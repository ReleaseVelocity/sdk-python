name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Bind to the manual-approval environment so environment-scoped secrets
    # (notably STRANDS_INTEG_TEST_ROLE) are exposed only after a maintainer
    # approves the run. This is required for pull_request_target runs from
    # Dependabot branches: standard repository Actions secrets are not passed
    # to Dependabot-context runs, but environment secrets gated behind a
    # required-reviewer rule are released to the job once approved, while
    # preserving the security posture of pull_request_target.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        # Fail fast with a clear, actionable message instead of letting
        # configure-aws-credentials retry 12 times against an empty role ARN.
        # This typically indicates the STRANDS_INTEG_TEST_ROLE secret has not
        # been configured for this context (e.g., missing as an environment
        # secret on `manual-approval`, or missing from the Dependabot secret
        # store for Dependabot-triggered runs).
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::STRANDS_INTEG_TEST_ROLE secret is empty in this run context."
            echo "::error::For pull_request_target runs from Dependabot branches, this secret must be configured as an environment secret on the 'manual-approval' environment (Settings -> Environments -> manual-approval -> Add secret), or added to the Dependabot secret store (Settings -> Secrets and variables -> Dependabot)."
            exit 1
          fi
          echo "STRANDS_INTEG_TEST_ROLE is present (value masked)."

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
