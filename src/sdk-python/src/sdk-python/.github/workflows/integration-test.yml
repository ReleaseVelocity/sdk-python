name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Skip this job when secrets are not available in the run's context.
    # GitHub does not expose Actions secrets to runs triggered by Dependabot
    # or to pull_request_target runs whose head ref lives in a forked
    # repository. Without secrets, ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
    # resolves to the empty string and `aws-actions/configure-aws-credentials`
    # fails with a misleading "Could not load credentials from any providers"
    # error after exhausting all retries. Skipping is the correct outcome:
    # such PRs cannot run the AWS-backed integration suite anyway, and
    # maintainers can re-run the suite from a trusted branch / merge_group.
    # `merge_group` events always run in the base repository context and
    # therefore have access to secrets.
    if: >-
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request_target' &&
        github.actor != 'dependabot[bot]' &&
        github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
