services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python-img
    container_name: strands-sdk-python
    environment:
      # AWS credentials are not required for unit tests (moto mocks them),
      # but a default region avoids boto3 configuration warnings.
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
    volumes:
      - ../src:/app/src
      - ../tests:/app/tests
      - ../tests_integ:/app/tests_integ
      - ../pyproject.toml:/app/pyproject.toml
    command: ["sleep", "infinity"]
