services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    image: strands-sdk-python:dev
    environment:
      # hatch-vcs version pretend (no .git in container)
      SETUPTOOLS_SCM_PRETEND_VERSION: "1.0.0"
      # Tests use moto-mocked AWS; provide dummy creds/region as a sane default.
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-west-2"
      LOG_LEVEL: "INFO"
    working_dir: /app
    command: ["sleep", "infinity"]
