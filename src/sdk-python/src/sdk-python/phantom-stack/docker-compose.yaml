services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    container_name: strands-sdk-python
    working_dir: /app
    command: sleep infinity
    environment:
      # Dummy AWS credentials so boto3-based code/tests don't fail credential
      # lookups. Override with real values to talk to AWS services.
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-test}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-test}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-west-2}"
