services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:latest
    container_name: strands-sdk-python
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0
      # Dummy AWS creds so boto3-based tests that don't use moto don't probe metadata
      - AWS_DEFAULT_REGION=us-west-2
    command: sleep infinity
