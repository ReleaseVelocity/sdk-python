services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: app
    container_name: strands-sdk-python
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION=1.0.0
      # Sane defaults so moto-based tests have credentials/region available.
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-west-2
    working_dir: /app
    command: sleep infinity
