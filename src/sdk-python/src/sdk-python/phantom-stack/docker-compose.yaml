services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    container_name: strands-sdk-python
    environment:
      # Provide pretend version so any in-container re-install / build works
      # without a git repository present.
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Dummy AWS creds so boto3-based unit tests (mocked via moto) run.
      AWS_DEFAULT_REGION: "us-west-2"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
    command: ["sleep", "infinity"]
