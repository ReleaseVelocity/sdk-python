services:
  sdk-python:
    image: app
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    environment:
      # Pretend version for hatch-vcs (no .git in context)
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0
      # Avoid real AWS/network calls during tests; moto mocks are used.
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=testing
      - AWS_SECRET_ACCESS_KEY=testing
    working_dir: /app
    command: sleep infinity
