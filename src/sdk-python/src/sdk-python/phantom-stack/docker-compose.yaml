services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      network: host
      args:
        STRANDS_VERSION: "0.0.0"
    image: strands-sdk-python:dev
    working_dir: /app
    # Mount the project source for live development. The installed editable
    # package points at /app/src, so code changes are picked up immediately.
    volumes:
      - ..:/app
    command: ["sleep", "infinity"]
