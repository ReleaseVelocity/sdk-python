services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      args:
        HATCH_VCS_PRETEND_VERSION: "0.0.0"
    image: sdk-python:latest
    container_name: sdk-python
    environment:
      # Default AWS test creds so moto-backed unit tests run cleanly.
      AWS_DEFAULT_REGION: us-west-2
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
    working_dir: /app
    command: ["sleep", "infinity"]
