services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      args:
        PRETEND_VERSION: "0.0.0"
    image: app
    container_name: strands-sdk-python
    environment:
      # Dummy AWS creds so boto3-backed tests/imports never reach the network.
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      AWS_DEFAULT_REGION: "us-west-2"
      SETUPTOOLS_SCM_PRETEND_VERSION_FOR_STRANDS_AGENTS: "0.0.0"
    working_dir: /app
    command: ["sleep", "infinity"]
