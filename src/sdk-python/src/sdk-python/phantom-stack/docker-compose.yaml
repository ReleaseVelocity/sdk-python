services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:latest
    container_name: strands-sdk-python
    working_dir: /app
    environment:
      # Fallback version for hatch-vcs (no git tags in context).
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Default region used by tests/moto fixtures.
      AWS_DEFAULT_REGION: "us-west-2"
    command: ["sleep", "infinity"]
