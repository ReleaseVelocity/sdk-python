services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python
    environment:
      # hatch-vcs pretend version (no git history in container)
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
      # Dummy AWS creds so boto3/moto-based tests have a region/credentials.
      AWS_DEFAULT_REGION: "us-west-2"
    command: ["sleep", "infinity"]
