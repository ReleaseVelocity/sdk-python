services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    environment:
      # No real AWS calls are made; tests use moto. Provide harmless defaults.
      AWS_DEFAULT_REGION: us-west-2
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
    working_dir: /app
    command: sleep infinity
