services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      network: host
    container_name: sdk-python
    environment:
      HATCH_VCS_PRETEND_VERSION: "0.0.0+dev"
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0+dev"
      # Dummy AWS credentials so boto3-based tests have a default region/creds
      # (real tests use moto to mock AWS; nothing leaves the container).
      AWS_DEFAULT_REGION: "us-west-2"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
    command: ["sleep", "infinity"]
