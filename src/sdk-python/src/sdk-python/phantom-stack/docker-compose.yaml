services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:latest
    container_name: strands-sdk-python
    environment:
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
      # Dummy AWS creds so boto3-based tests/clients can instantiate without
      # real credentials. Tests use moto for mocking.
      AWS_DEFAULT_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
    command: ["sleep", "infinity"]
