# NOTE: The Docker bridge network used by `docker-compose build` has no
# outbound connectivity in this environment, so the image must be built with
# host networking first:
#
#   cd /workspace/src/sdk-python
#   docker build --network=host -f phantom-stack/Dockerfile -t sdk-python:dev .
#
# `docker-compose up -d` then runs that pre-built image.
services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    working_dir: /app
    command: ["sleep", "infinity"]
