services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    image: strands-sdk-python
    environment:
      # Default fake AWS creds/region so boto3-based imports/tests behave; tests
      # use moto, but having a region avoids accidental config lookups.
      AWS_DEFAULT_REGION: us-west-2
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
    working_dir: /app
    command: ["sleep", "infinity"]
