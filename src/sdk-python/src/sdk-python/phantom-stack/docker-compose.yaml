services:
  sdk-python:
    container_name: strands-sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
      args:
        SETUPTOOLS_SCM_PRETEND_VERSION: ${SETUPTOOLS_SCM_PRETEND_VERSION:-0.0.0}
    image: strands-sdk-python
    working_dir: /app
    command: sleep infinity
    volumes:
      - ../src:/app/src
      - ../tests:/app/tests
      - ../tests_integ:/app/tests_integ
