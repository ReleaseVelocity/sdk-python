services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: sdk-python
    image: sdk-python:latest
    working_dir: /app
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0
      - PYTHONUNBUFFERED=1
    # Keep the container alive so developers can exec in and run tests/linters.
    command: ["sleep", "infinity"]
