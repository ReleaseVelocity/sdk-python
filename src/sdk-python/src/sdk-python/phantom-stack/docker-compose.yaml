services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: strands-sdk-python:dev
    container_name: strands-sdk-python
    environment:
      # Fallback version since the build context has no git tags.
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0+dev"
      SETUPTOOLS_SCM_PRETEND_VERSION_FOR_STRANDS_AGENTS: "0.0.0+dev"
    working_dir: /app
    command: ["tail", "-f", "/dev/null"]
