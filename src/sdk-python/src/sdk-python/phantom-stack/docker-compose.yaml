services:
  sdk-python:
    image: sdk-python:dev
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: sdk-python
    working_dir: /app
    environment:
      - SETUPTOOLS_SCM_PRETEND_VERSION=0.0.0+dev
      # Models require provider credentials at runtime; left unset for dev.
      - AWS_DEFAULT_REGION=us-east-1
    command: sleep infinity
