services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    working_dir: /app
    environment:
      # Allow hatch-vcs to resolve a version without git metadata.
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
      # Dummy AWS creds so boto3-based tests that don't use moto don't probe.
      AWS_DEFAULT_REGION: "us-west-2"
    command: ["sleep", "infinity"]
