name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      # Fail fast (with a clear message) if the IAM role secret is not exposed
      # to this run. Repository secrets are not passed to runs triggered by
      # Dependabot or by `pull_request_target` from forks, which would
      # otherwise cause `aws-actions/configure-aws-credentials` to spend
      # 60+ seconds exhausting its retry loop on empty inputs.
      - name: Verify integ test role secret is available
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Secret STRANDS_INTEG_TEST_ROLE is not available to this run."
            echo "This typically happens when the workflow is triggered by Dependabot"
            echo "or by a pull_request_target run from a fork, neither of which"
            echo "receive repository Actions secrets by default."
            echo ""
            echo "Resolution options:"
            echo "  - For Dependabot: add STRANDS_INTEG_TEST_ROLE under"
            echo "    Settings -> Secrets and variables -> Dependabot."
            echo "  - For fork PRs: re-run from a trusted context (merge_group)"
            echo "    or label-gate this workflow."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
