services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: strands-sdk-python
    image: strands-sdk-python
    working_dir: /app
    environment:
      HATCH_VCS_PRETEND_VERSION: "0.0.0"
      # Default region for boto3/moto-based tests so they don't fail on config.
      AWS_DEFAULT_REGION: us-east-1
    command: sleep infinity
