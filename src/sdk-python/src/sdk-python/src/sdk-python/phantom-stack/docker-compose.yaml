services:
  sdk-python:
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    container_name: sdk-python
    image: sdk-python:dev
    environment:
      # Used by hatch-vcs when no git metadata is present.
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"
      # Dummy AWS creds so boto3/moto-based tests have a region/credentials.
      AWS_DEFAULT_REGION: "us-west-2"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
    working_dir: /app
    # Keep the container alive so developers can exec in and run tests/linters.
    command: ["sleep", "infinity"]
