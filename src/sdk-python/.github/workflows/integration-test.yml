name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Scope this job to the `manual-approval` GitHub Environment so that:
    #   1. STRANDS_INTEG_TEST_ROLE (configured as an environment secret) is
    #      reliably resolved into the secrets context, even when the workflow
    #      is triggered by Dependabot or fork-origin `pull_request_target`
    #      events (which are otherwise denied access to repository Actions
    #      secrets and resolve `${{ secrets.STRANDS_INTEG_TEST_ROLE }}` to an
    #      empty string).
    #   2. Required-reviewer protection on the environment gates AWS
    #      credential exposure for fork / Dependabot PRs, mitigating the
    #      security risk of combining `pull_request_target` with AWS role
    #      assumption.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integ-test role secret is configured
        # Fail fast (in seconds) with an actionable error if the secret did
        # not resolve, instead of letting configure-aws-credentials exhaust
        # its 12-attempt / ~90s retry storm with an opaque
        # "Could not load credentials from any providers" message.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::secrets.STRANDS_INTEG_TEST_ROLE is empty for this run."
            echo "::error::This typically means the workflow was triggered in a context that cannot read the secret"
            echo "::error::(e.g. a Dependabot or fork pull_request_target run without environment-scoped secrets)."
            echo "::error::Configure STRANDS_INTEG_TEST_ROLE as a secret on the 'manual-approval' environment"
            echo "::error::(Settings -> Environments -> manual-approval -> Add secret), or as a Dependabot secret"
            echo "::error::(Settings -> Secrets and variables -> Dependabot), then re-run this workflow."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
