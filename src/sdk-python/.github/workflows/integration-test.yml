name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      # Preflight guard: fail fast with a clear, actionable message when the
      # IAM role secret is not available. This commonly happens for
      # `pull_request_target` runs from forks and Dependabot PRs, which do
      # not have access to repository Actions secrets by default. Without
      # this guard, `aws-actions/configure-aws-credentials` retries 12 times
      # over several minutes before failing with a generic
      # "Could not load credentials from any providers" error.
      - name: Verify AWS role secret is available
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Secret STRANDS_INTEG_TEST_ROLE is not set or is empty."
            echo "::error::This typically happens for Dependabot PRs or pull_request_target runs from forks, which do not have access to repository Actions secrets."
            echo "::error::To fix: ensure the secret exists in Settings > Secrets and variables > Actions, and (for Dependabot) add it under Settings > Secrets and variables > Dependabot."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
