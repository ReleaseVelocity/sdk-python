name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        # `pull_request_target` runs originating from Dependabot use the
        # Dependabot secrets scope rather than the Actions secrets scope. If
        # `STRANDS_INTEG_TEST_ROLE` has not been mirrored into Dependabot
        # secrets, it resolves to an empty string here. Without this guard the
        # subsequent `aws-actions/configure-aws-credentials` step retries the
        # credential-provider chain 12 times before failing with the opaque
        # message "Could not load credentials from any providers", obscuring
        # the real cause. Fail fast with an actionable message instead.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is not available to this workflow run."
            echo "::error::If this run was triggered by Dependabot, mirror STRANDS_INTEG_TEST_ROLE (and STRANDS_TEST_API_KEYS_SECRET_NAME) into the repository's Dependabot secrets scope (Settings -> Secrets and variables -> Dependabot)."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
