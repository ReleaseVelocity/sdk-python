name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Gate access to AWS credential secrets behind the `manual-approval`
    # GitHub environment. Because this workflow is triggered by
    # `pull_request_target` (which runs in the context of the base
    # repository), repository-scoped secrets such as
    # `STRANDS_INTEG_TEST_ROLE` are intentionally NOT exposed to runs
    # originating from forks or from Dependabot. Sourcing the secrets
    # from an environment forces a reviewer-gated approval before the
    # job can read them, which is the recommended secure pattern for
    # this trigger. Make sure that:
    #   * `STRANDS_INTEG_TEST_ROLE` and `STRANDS_TEST_API_KEYS_SECRET_NAME`
    #     are configured as environment-scoped secrets on the
    #     `manual-approval` environment.
    #   * The `manual-approval` environment has required reviewers
    #     configured under its protection rules.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        # Fail fast with an actionable message when the OIDC role secret
        # is not available to this run (e.g. fork PR without environment
        # approval, Dependabot PR without Dependabot-scoped secrets, or
        # missing repo/environment configuration). Without this guard
        # the next step retries 12 times over ~2 minutes with an opaque
        # "Could not load credentials from any providers" error.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Secret STRANDS_INTEG_TEST_ROLE is empty or unavailable to this run."
            echo "This typically means the run was triggered from a context that"
            echo "cannot access the secret (e.g. a fork PR without environment"
            echo "approval, or a Dependabot PR). Configure STRANDS_INTEG_TEST_ROLE"
            echo "as an environment-scoped secret on the 'manual-approval'"
            echo "environment, or have an approver release the deployment."
            exit 1
          fi
      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
