name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Bind the job to the `manual-approval` GitHub Environment so that
    # environment-scoped secrets (in particular STRANDS_INTEG_TEST_ROLE) are
    # exposed to the run. Without this binding, the secret expression
    # ${{ secrets.STRANDS_INTEG_TEST_ROLE }} resolved to an empty string,
    # aws-actions/configure-aws-credentials was invoked without a
    # `role-to-assume`, and the action failed after 12 retries with
    # "Could not load credentials from any providers". Binding the job to
    # the environment also preserves the existing manual-approval gate for
    # this pull_request_target workflow.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integration test role secret is available
        # Fail fast with a clear message when the AWS role secret is not
        # delivered to this run (e.g. environment binding regression, secret
        # not set, or fork PR where org/env secrets aren't exposed). This
        # surfaces the misconfiguration immediately instead of letting
        # configure-aws-credentials retry for ~60s before giving up.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::STRANDS_INTEG_TEST_ROLE secret is not available to this run."
            echo "Check that the secret is defined in the 'manual-approval' GitHub Environment"
            echo "and that this job has 'environment: manual-approval' set."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
