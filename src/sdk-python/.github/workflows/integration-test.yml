name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Skip when secrets are not available in the workflow context, otherwise
    # the `Configure Credentials` step will fail with
    # `Could not load credentials from any providers` after exhausting all
    # retries against the default credential provider chain.
    #
    # Under `pull_request_target`, secrets from the base repo's Actions store
    # are NOT exposed for:
    #   - Pull requests opened from a forked repository
    #   - Dependabot pull requests (Dependabot uses a separate secret store)
    #
    # For `merge_group` events, `github.event.pull_request` is null, so the
    # head/base repo comparison short-circuits via the event_name check and
    # the job runs.
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name != 'pull_request_target' ||
       github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name)
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are present
        # Fail fast with a clear message if the integration-test role secret
        # is not populated, rather than letting `configure-aws-credentials`
        # spend ~2.5 minutes retrying the default credential provider chain.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is empty in this run's context."
            echo "This typically happens for forked-repo or Dependabot pull_request_target runs."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
