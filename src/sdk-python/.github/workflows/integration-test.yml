name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integration-test role secret is configured
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Repository secret STRANDS_INTEG_TEST_ROLE is missing or empty for this run."
            echo "::error::The aws-actions/configure-aws-credentials step requires a role ARN to perform OIDC AssumeRoleWithWebIdentity."
            echo "::error::This commonly occurs when the workflow is triggered from a context where repository secrets are not exposed (e.g., forked PRs without secret access, or merge_group runs from unauthorized contexts)."
            echo "::error::Action required: ensure the STRANDS_INTEG_TEST_ROLE repository/organization secret is populated with a valid IAM role ARN whose trust policy allows the GitHub OIDC provider for this repository."
            exit 1
          fi
          echo "STRANDS_INTEG_TEST_ROLE secret is present; proceeding with credential configuration."

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
