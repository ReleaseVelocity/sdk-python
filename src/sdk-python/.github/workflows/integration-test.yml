name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Skip for Dependabot-triggered runs: GitHub does not expose repo/org Actions
    # secrets to workflows triggered by Dependabot via pull_request_target, which
    # makes ${{ secrets.STRANDS_INTEG_TEST_ROLE }} resolve to an empty string and
    # causes aws-actions/configure-aws-credentials to fail with
    # "Could not load credentials from any providers." To run integration tests
    # for Dependabot PRs, add the required secrets as Dependabot secrets or attach
    # them to an environment that Dependabot is allowed to access.
    if: github.actor != 'dependabot[bot]'
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        # Fail fast with an actionable error instead of letting
        # configure-aws-credentials retry 12 times (~90s) when the secret is
        # missing or empty (e.g. when the secret has not yet been configured,
        # or when the workflow runs in a context that cannot read it).
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is not set or is empty."
            echo "::error::This typically happens for Dependabot-triggered runs (Dependabot does not have access to repo/org Actions secrets) or when the workflow is run from a context that cannot read the secret."
            echo "::error::Add STRANDS_INTEG_TEST_ROLE as a Dependabot secret, or attach it to a GitHub Environment accessible to this workflow."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
