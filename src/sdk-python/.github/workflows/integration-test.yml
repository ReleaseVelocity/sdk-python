name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Scope the job to the `manual-approval` environment so environment-scoped
    # secrets (notably STRANDS_INTEG_TEST_ROLE) are exposed to this job. Without
    # this, environment secrets evaluate to an empty string at runtime and the
    # `aws-actions/configure-aws-credentials` step falls through to the default
    # provider chain on the hosted runner and fails after 12 retries.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are present
        # Fail fast with a clear message if STRANDS_INTEG_TEST_ROLE is missing
        # or empty. Without this guard, configure-aws-credentials silently
        # drops the empty input, retries 12 times against the default provider
        # chain (~2 min), and produces a confusing "Could not load credentials
        # from any providers" error that obscures the real (config) cause.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is not set or is empty. Configure it as an environment secret on the 'manual-approval' environment (or as a repository secret) with a valid IAM role ARN whose trust policy allows GitHub OIDC for repo:ReleaseVelocity/sdk-python:* with audience sts.amazonaws.com."
            exit 1
          fi
      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
