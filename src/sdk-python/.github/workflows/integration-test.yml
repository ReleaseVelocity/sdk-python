name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Bind to the `manual-approval` environment so environment-scoped secrets
    # (e.g. STRANDS_INTEG_TEST_ROLE) are injected into this job. Without this,
    # the secret reference resolves to an empty string under pull_request_target
    # / Dependabot contexts and aws-actions/configure-aws-credentials fails with
    # "Could not load credentials from any providers".
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        # Fail fast with a clear message if STRANDS_INTEG_TEST_ROLE is not
        # available to this run (e.g. fork PR, missing environment binding,
        # or Dependabot context where the secret has not been provisioned).
        # This avoids the ~2 minutes of retry loops inside
        # aws-actions/configure-aws-credentials.
        # The `secrets` context cannot be used in a step-level `if:`, so we
        # forward the secret to an env var and check it inside the script.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::STRANDS_INTEG_TEST_ROLE secret is empty. This typically means the workflow is running in a context where the 'manual-approval' environment secret is not injected (fork PR, Dependabot, or missing environment binding). Aborting before AWS credential configuration."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
