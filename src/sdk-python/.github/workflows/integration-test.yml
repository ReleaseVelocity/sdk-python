name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      # Fail fast with a clear, actionable message when the integ-test IAM role
      # secret is not available to this run. Without this guard, configure-aws-credentials
      # silently falls back to the default provider chain and emits 12 retries of an
      # opaque "Could not load credentials from any providers" error. This typically
      # happens when the workflow is triggered by a context that does not have
      # access to repository Actions secrets (e.g. Dependabot PRs, fork PRs via
      # pull_request_target), or when the secret has not been configured in the repo.
      - name: Validate integration test configuration
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::secrets.STRANDS_INTEG_TEST_ROLE is empty for this run."
            echo "::error::This usually means the workflow was triggered by a context"
            echo "::error::without access to repository Actions secrets (e.g. Dependabot"
            echo "::error::or a fork PR via pull_request_target), or the secret is not"
            echo "::error::configured. Configure STRANDS_INTEG_TEST_ROLE in repo settings"
            echo "::error::(Settings > Secrets and variables > Actions, plus Dependabot"
            echo "::error::secrets if applicable), or scope it to a GitHub Environment"
            echo "::error::with manual approval before re-running."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
