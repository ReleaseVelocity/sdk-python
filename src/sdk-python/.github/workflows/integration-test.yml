name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Repository secrets (e.g. STRANDS_INTEG_TEST_ROLE) are NOT exposed to
    # `pull_request_target` runs originating from forks or from Dependabot.
    # Without the secret the OIDC role-assume input renders empty and the
    # `aws-actions/configure-aws-credentials` step fails with "Could not load
    # credentials from any providers". Gate the job to contexts where secrets
    # are guaranteed to be available:
    #   - `merge_group` events (always run from the base repo).
    #   - `pull_request_target` events whose head ref lives in this repo
    #     (i.e. not a fork) AND were not opened by Dependabot.
    if: >-
      github.event_name == 'merge_group' ||
      (
        github.event_name == 'pull_request_target' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.actor != 'dependabot[bot]'
      )
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
