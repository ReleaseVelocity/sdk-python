name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Skip when the workflow cannot access the required secret. Repository
    # secrets are not exposed to:
    #   - pull_request_target events triggered by Dependabot (use Dependabot
    #     secrets instead), or
    #   - pull_request_target events from forked repositories (by design).
    # In both cases STRANDS_INTEG_TEST_ROLE expands to an empty string and
    # aws-actions/configure-aws-credentials wastes ~105s exhausting retries
    # before failing. Skip cleanly instead.
    if: >-
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request_target' &&
       github.actor != 'dependabot[bot]' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        # Fail fast with an actionable message instead of waiting ~105s for
        # the AWS credentials action to exhaust 12 default-provider retries
        # when the secret is missing or scoped to an unattached environment.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is empty or not available to this run."
            echo "If this run was triggered by Dependabot, configure the secret under Settings → Secrets and variables → Dependabot."
            echo "If this run originated from a fork, secrets cannot be passed to fork-originated pull_request_target runs."
            echo "Otherwise, ensure the secret exists at the repository or organization level and is not restricted to an environment that this job does not declare."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
