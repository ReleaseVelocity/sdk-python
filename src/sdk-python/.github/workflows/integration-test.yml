name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    # Skip when triggered by Dependabot: regular Actions secrets (including
    # STRANDS_INTEG_TEST_ROLE) are NOT exposed to Dependabot-triggered runs,
    # so this workflow cannot configure AWS credentials in that context.
    # Dependabot PRs would otherwise hit a deterministic 12-retry credential
    # failure in `aws-actions/configure-aws-credentials`.
    if: ${{ github.actor != 'dependabot[bot]' && github.event.pull_request.user.login != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      # Fail fast with a clear, diagnosable error if the AWS role secret is
      # not available in this trigger context (e.g. fork PR, missing secret,
      # secret rotated to empty). Without this guard, the next step retries
      # 12 times over ~2 minutes with the opaque message "Could not load
      # credentials from any providers".
      - name: Verify AWS role secret is available
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::secrets.STRANDS_INTEG_TEST_ROLE is empty or not available in this trigger context. Check that the secret exists under Settings -> Secrets and variables -> Actions, and that the trigger context (event/actor) has access to it."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
