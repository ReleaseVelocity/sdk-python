name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      # Fail fast with a clear message when the AWS role secret is unavailable
      # to the run context (e.g. Dependabot / fork PRs triggered via
      # pull_request_target, or the secret being deleted/renamed).
      # Without this guard, aws-actions/configure-aws-credentials silently
      # omits role-to-assume and burns ~90s exhausting 12 credential-provider
      # retries before failing with an opaque "Could not load credentials"
      # error. Note: ${{ secrets.X }} cannot be referenced in `if:`
      # conditions, so the secret must first be exposed via env.
      - name: Verify integ-test role secret is available
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Secret STRANDS_INTEG_TEST_ROLE is empty in this run context."
            echo "::error::This typically happens when the workflow is triggered by a Dependabot or fork PR via pull_request_target,"
            echo "::error::which does not expose repository Actions secrets. Configure the role ARN as a Dependabot secret"
            echo "::error::(Settings -> Secrets and variables -> Dependabot) and/or gate this job behind a GitHub Environment"
            echo "::error::with required reviewers, or verify the secret still exists at the repo/org level."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
