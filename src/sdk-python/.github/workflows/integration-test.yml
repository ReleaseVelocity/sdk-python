name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Skip integration tests for Dependabot PRs: GitHub does not expose
    # repository or environment secrets to `pull_request_target` runs
    # triggered by Dependabot (or other forked PRs) by default. Running
    # aws-actions/configure-aws-credentials without role-to-assume causes
    # ~88s of opaque credential-provider retries before failing. Skipping
    # is the deliberate, secure default — maintainers can run the
    # integration suite manually after reviewing the PR.
    if: ${{ github.actor != 'dependabot[bot]' }}
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is empty or unavailable to this workflow run."
            echo "::error::This typically happens when a pull_request_target run originates from a fork or Dependabot,"
            echo "::error::or when the secret has not been configured in repository/environment settings."
            echo "::error::Add STRANDS_INTEG_TEST_ROLE under Settings -> Secrets and variables -> Actions"
            echo "::error::(and Dependabot, if applicable), or restrict this workflow to trusted contexts."
            exit 1
          fi
      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
