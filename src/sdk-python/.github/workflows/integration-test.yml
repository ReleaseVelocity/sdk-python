name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    # Skip integration tests for Dependabot PRs. `pull_request_target` runs
    # triggered by Dependabot use the Dependabot secret scope (Settings →
    # Secrets and variables → Dependabot), which does not have access to
    # `STRANDS_INTEG_TEST_ROLE` / `STRANDS_TEST_API_KEYS_SECRET_NAME`. Running
    # this job in that context resolves `role-to-assume` to an empty string
    # and causes `aws-actions/configure-aws-credentials` to fall back to
    # default providers and fail after ~2.5 minutes of retries.
    if: ${{ github.actor != 'dependabot[bot]' && github.event.pull_request.user.login != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        # Fail fast with a clear message when the integ-test role secret is
        # not populated in the current secret scope (e.g. fork PR or a
        # context where the Actions secret was not propagated). Without this
        # guard, `configure-aws-credentials` retries 12 times over ~2.5
        # minutes with a generic "Could not load credentials from any
        # providers" error that obscures the real cause.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::STRANDS_INTEG_TEST_ROLE secret is not available in this context. This is expected for fork PRs and Dependabot PRs (which use a separate Dependabot secret scope). Configure the secret under Settings → Secrets and variables → Actions (and Dependabot, if applicable) to enable integration tests."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
