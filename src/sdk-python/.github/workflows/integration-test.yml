name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integ-test role secret is available in this trigger context
        # Fail fast (rather than waiting ~3 minutes for aws-actions/configure-aws-credentials
        # to exhaust 12 retries with a generic "Could not load credentials from any providers"
        # error) when secrets.STRANDS_INTEG_TEST_ROLE expands to an empty string. The most
        # common cause is that the workflow was triggered by a context that does not have
        # access to repository Actions secrets (e.g. a Dependabot pull_request_target event,
        # an unprivileged bot, or an environment-scoped secret without an `environment:` key
        # on this job). Surfacing a clear error here makes the misconfiguration obvious
        # instead of masquerading as a transient AWS/STS outage.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error title=Missing STRANDS_INTEG_TEST_ROLE secret::secrets.STRANDS_INTEG_TEST_ROLE is empty in this trigger context (event=${{ github.event_name }}, actor=${{ github.actor }}). aws-actions/configure-aws-credentials needs a role ARN to assume via OIDC. Likely causes: (1) the secret is not defined at the repository/org level; (2) the run was triggered by Dependabot or another bot whose pull_request_target events do not receive Actions secrets (add a Dependabot secret of the same name, or gate this job on github.actor); (3) the secret is scoped to a GitHub Environment but this job does not declare 'environment:' to receive it."
            exit 1
          fi
          echo "STRANDS_INTEG_TEST_ROLE secret is present (length=${#STRANDS_INTEG_TEST_ROLE})."

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
