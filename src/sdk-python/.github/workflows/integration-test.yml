name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    # Skip the job for Dependabot-originated runs. Dependabot does not receive
    # repository Actions secrets, so `secrets.STRANDS_INTEG_TEST_ROLE` resolves
    # to an empty string and `aws-actions/configure-aws-credentials` falls back
    # to the default credential chain (which does not exist on a hosted runner).
    # The result was ~90s of `validateCredentials` retries followed by a
    # misleading "Could not load credentials from any providers" failure.
    # If Dependabot integration coverage is required, mirror the secret under
    # Settings → Secrets and variables → Dependabot and remove this guard.
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integration-test role secret is configured
        # Defense-in-depth: fail fast with a clear message instead of letting
        # `configure-aws-credentials` time out retrying credential loading
        # when `STRANDS_INTEG_TEST_ROLE` is unset (e.g. fork PRs that bypass
        # the dependabot actor check above).
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::STRANDS_INTEG_TEST_ROLE secret is not available to this run." \
                 "Integration tests require an OIDC role and cannot run from forks or" \
                 "Dependabot without the secret being mirrored to the appropriate scope."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
