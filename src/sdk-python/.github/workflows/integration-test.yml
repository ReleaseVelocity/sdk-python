name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Skip integration tests for Dependabot PRs and PRs from forks. Repository
    # secrets (e.g. STRANDS_INTEG_TEST_ROLE) are not exposed to those secret
    # contexts by default, so aws-actions/configure-aws-credentials would
    # receive an empty role-to-assume and fail after exhausting STS retries.
    # `merge_group` events do not populate `github.event.pull_request`, so the
    # head-repo guard is only enforced when a pull_request payload is present.
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name != 'pull_request_target' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integration-test role secret is configured
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::secrets.STRANDS_INTEG_TEST_ROLE is empty for this run. This is expected for Dependabot PRs and PRs from forks, where repository secrets are not exposed. If this is an internal PR, verify the secret is provisioned at the repository or organization level."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
