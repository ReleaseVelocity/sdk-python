name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Skip Dependabot-authored PRs: GitHub does not expose standard Actions
    # secrets to workflows triggered by Dependabot, so STRANDS_INTEG_TEST_ROLE
    # would resolve to an empty string and the credential provider chain would
    # fail with an opaque "Could not load credentials from any providers" error
    # after 12 retries (~75s). Dependabot has its own separate secret store;
    # privileged integration tests should not run from those PRs.
    if: ${{ github.actor != 'dependabot[bot]' && github.event.pull_request.user.login != 'dependabot[bot]' }}
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integration-test role secret is available
        # Fail fast (in <2s) with an actionable error if the OIDC role secret
        # is missing/empty (e.g., fork PRs or other contexts where the
        # repository's Actions secrets are not exposed). Without this guard,
        # aws-actions/configure-aws-credentials retries 12 times before
        # surfacing a generic "Could not load credentials" message.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Secret STRANDS_INTEG_TEST_ROLE is empty or not available in this workflow context."
            echo "::error::This typically happens for Dependabot PRs or fork PRs, where GitHub does not expose standard Actions secrets."
            echo "::error::See repository Settings -> Secrets and variables -> Actions / Dependabot to verify the secret is defined for the appropriate context."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
