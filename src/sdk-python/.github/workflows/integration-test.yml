name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Bind to the `manual-approval` environment so that secrets such as
    # STRANDS_INTEG_TEST_ROLE and STRANDS_TEST_API_KEYS_SECRET_NAME (configured
    # as environment secrets) are only exposed to this job after the
    # environment's required-reviewer protection rule is satisfied. This is the
    # hardened pattern for `pull_request_target` workflows: it prevents PRs
    # from forks/Dependabot from accessing AWS credentials without a human
    # approval, and ensures the role-to-assume secret resolves to a non-empty
    # value at runtime.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Validate required secrets are available
        # Fail fast with an actionable message if the integration-test role
        # secret is missing or empty. Without this guard,
        # `configure-aws-credentials` silently retries 12 times (~60s) before
        # failing with the generic "Could not load credentials from any
        # providers" error, which obscures the real (configuration) problem.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is missing or empty."
            echo "::error::Ensure it is configured as an environment secret on the 'manual-approval' GitHub environment and that this run has been approved by a required reviewer."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
