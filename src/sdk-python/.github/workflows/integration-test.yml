name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Bind to the `manual-approval` GitHub Environment so that environment
    # secrets (e.g. STRANDS_INTEG_TEST_ROLE) are made available to the job
    # when triggered by `pull_request_target` from forks/Dependabot.
    # Without this binding, repository secrets are not exposed to those
    # contexts and `role-to-assume` resolves to an empty string, causing
    # the AWS credentials action to fail with "Could not load credentials
    # from any providers".
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secret is available
        # Fail fast with a clear message if the environment secret is missing,
        # instead of letting configure-aws-credentials retry 12 times (~100s)
        # with an opaque "Could not load credentials from any providers" error.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::secrets.STRANDS_INTEG_TEST_ROLE is empty. Ensure the job is bound to the GitHub Environment that holds this secret and that the secret is configured (Settings -> Environments -> manual-approval)."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
