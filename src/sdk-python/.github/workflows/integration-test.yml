name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Skip on pull_request_target events when the head ref comes from a fork
    # or any context (e.g. Dependabot) that does not have access to repository
    # Actions secrets. Without this guard, `secrets.STRANDS_INTEG_TEST_ROLE`
    # silently resolves to an empty string and the AWS credentials step fails
    # deep in its retry loop with a confusing
    # "Could not load credentials from any providers" error.
    # `merge_group` events always run from the base repo, so they are allowed.
    if: >-
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request_target' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is empty or unset for this run."
            echo "::error::This typically means the workflow was triggered from a context that cannot access repository Actions secrets"
            echo "::error::(for example a Dependabot PR, or a pull_request_target run from a fork)."
            echo "::error::Configure the secret under Settings -> Secrets and variables -> Actions, and if Dependabot PRs need it,"
            echo "::error::also mirror it under Settings -> Secrets and variables -> Dependabot."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
