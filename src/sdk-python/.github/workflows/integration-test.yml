name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Gate this job on the manual-approval GitHub Environment so that
    # environment-scoped secrets (and required-reviewer protection rules)
    # apply for fork/Dependabot PRs. Repository-level secrets are not
    # exposed to Dependabot-triggered workflows by default, which causes
    # ${{ secrets.STRANDS_INTEG_TEST_ROLE }} to expand to an empty string
    # and aws-actions/configure-aws-credentials to fail with
    # "Could not load credentials from any providers".
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        # Fail fast (in seconds) with a clear, actionable message when the
        # role secret is unavailable in this run context (e.g. a Dependabot
        # PR without the secret bound under Settings > Secrets and variables
        # > Dependabot, or a missing environment-scoped secret). Without
        # this check, the action below silently retries STS for ~100s before
        # erroring with a generic credentials message.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Secret STRANDS_INTEG_TEST_ROLE is empty or not available in this run context."
            echo "::error::For Dependabot PRs, add the role ARN under Settings > Secrets and variables > Dependabot,"
            echo "::error::or scope the secret to the 'manual-approval' GitHub Environment used by this job."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
