name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    # Skip for Dependabot-triggered runs: GitHub does not expose the
    # repository Actions secrets (STRANDS_INTEG_TEST_ROLE,
    # STRANDS_TEST_API_KEYS_SECRET_NAME) to workflows triggered by
    # Dependabot — Dependabot has its own separate secret store. Without
    # those secrets, configure-aws-credentials cannot assume the integ-test
    # role and the job fails deterministically with "Credentials could not
    # be loaded". Integration tests for Dependabot PRs should be run via a
    # separate, manually approved workflow.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are present
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        run: |
          missing=0
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is not set or not exposed to this workflow run."
            missing=1
          fi
          if [ -z "${STRANDS_TEST_API_KEYS_SECRET_NAME}" ]; then
            echo "::error::Required secret STRANDS_TEST_API_KEYS_SECRET_NAME is not set or not exposed to this workflow run."
            missing=1
          fi
          if [ "${missing}" -ne 0 ]; then
            echo "::error::Repository Actions secrets are not exposed to forks or to Dependabot-triggered runs. Contact repository administrators if you expected these to be available."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
