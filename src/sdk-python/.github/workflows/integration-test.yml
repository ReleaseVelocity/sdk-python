name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Gate the job behind the `manual-approval` GitHub Environment so that the
    # AWS role/secrets used below are only injected after a human reviewer
    # approves the deployment. This is required because the workflow is
    # triggered by `pull_request_target`, and on Dependabot- or fork-initiated
    # runs GitHub does not expose standard Actions secrets to the workflow
    # context. Without this gate, `secrets.STRANDS_INTEG_TEST_ROLE` resolves to
    # an empty string and `aws-actions/configure-aws-credentials` fails with
    # "Could not load credentials from any providers". Required reviewers must
    # be configured on the `manual-approval` environment in repo settings.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
