name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Gate this job on the `manual-approval` environment so that the
    # STRANDS_INTEG_TEST_ROLE / STRANDS_TEST_API_KEYS_SECRET_NAME secrets
    # are sourced as environment secrets and the job requires the
    # configured environment protection rules (e.g. required reviewers)
    # before it runs. Without an environment, repository secrets are not
    # exposed for `pull_request_target` runs originating from forks or
    # Dependabot, which causes `secrets.STRANDS_INTEG_TEST_ROLE` to expand
    # to an empty string and `aws-actions/configure-aws-credentials` to
    # fail with "Credentials could not be loaded".
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Missing STRANDS_INTEG_TEST_ROLE secret in this trigger context."
            echo "The role-to-assume secret resolved to an empty value. Ensure the"
            echo "'manual-approval' environment is configured with the"
            echo "STRANDS_INTEG_TEST_ROLE secret and that this run is gated by"
            echo "the environment's required-reviewer protection rule."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
