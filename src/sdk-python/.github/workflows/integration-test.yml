name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Skip on Dependabot pull_request_target events: by default Dependabot PRs
    # do not receive access to repository Actions secrets, so
    # `secrets.STRANDS_INTEG_TEST_ROLE` resolves to an empty string and the
    # `aws-actions/configure-aws-credentials` step fails after 12 opaque
    # retries. Skip cleanly so the run does not block dependency PRs.
    if: ${{ github.event_name != 'pull_request_target' || github.actor != 'dependabot[bot]' }}
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integration test role secret is available
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::STRANDS_INTEG_TEST_ROLE secret is not available in this context."
            echo "This typically happens for pull_request_target runs originating"
            echo "from forks or from Dependabot PRs, which do not receive access"
            echo "to repository Actions secrets by default. Configure the secret"
            echo "under Settings -> Secrets and variables -> Actions (and, if"
            echo "needed, mirror it under the Dependabot tab) or gate this job"
            echo "behind a manual-approval environment whose secrets are exposed."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
