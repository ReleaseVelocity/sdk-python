name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      # Fail fast with a clear, actionable message when the integration-test
      # role secret is empty (e.g. Dependabot PRs, forked-repo PRs, or contexts
      # where GitHub withholds Actions secrets). Without this guard, the
      # configure-aws-credentials action below retries 12 times and exits with
      # an opaque "Could not load credentials from any providers" error.
      - name: Validate required secrets
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error title=Missing secret::The 'STRANDS_INTEG_TEST_ROLE' secret is not available to this workflow run."
            echo "::error::This usually means one of the following:"
            echo "::error::  1. The secret is not configured at the repository or organization level (Settings -> Secrets and variables -> Actions)."
            echo "::error::  2. The PR is from Dependabot and a Dependabot-scoped secret has not been added (Settings -> Secrets and variables -> Dependabot)."
            echo "::error::  3. The PR is from a fork and GitHub is intentionally withholding secrets for security reasons."
            echo "Failing fast instead of letting aws-actions/configure-aws-credentials exhaust 12 retries."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
