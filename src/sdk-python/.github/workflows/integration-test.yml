name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Bind the job to the `manual-approval` environment so that:
    #   1. Environment-scoped secrets (e.g. STRANDS_INTEG_TEST_ROLE configured on
    #      the environment) are made available to the run. Repository-level
    #      `secrets.*` are NOT exposed to runs originating from forks or from
    #      Dependabot under `pull_request_target`, which is why
    #      `role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}` was
    #      resolving to an empty string and causing
    #      `aws-actions/configure-aws-credentials` to fail with
    #      "Could not load credentials from any providers".
    #   2. Required-reviewer protection rules on the environment gate
    #      execution before any code from the PR head is checked out, which
    #      is the standard `pull_request_target` security pattern.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
