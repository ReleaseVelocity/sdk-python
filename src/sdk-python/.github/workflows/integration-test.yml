name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Skip this job for Dependabot-authored pull_request_target runs because
    # Dependabot PRs run with the read-only `dependabot` secret scope by
    # default and cannot read repository Actions secrets such as
    # STRANDS_INTEG_TEST_ROLE. Without that secret, the
    # aws-actions/configure-aws-credentials action receives no role to
    # assume and exhausts its retries trying to load credentials from any
    # provider. Skipping early avoids ~2 minutes of wasted retries per run
    # and produces a clearer signal in the run summary.
    if: >-
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request_target' && github.actor != 'dependabot[bot]')
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integration-test role secret is available
        # Fail fast with a clear, actionable error if the role-to-assume
        # secret is empty/unset for this run's context. Without this guard,
        # configure-aws-credentials would silently render an empty
        # role-to-assume input and burn 12 retries (~2 minutes) before
        # failing with a generic "Could not load credentials from any
        # providers" error.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Secret STRANDS_INTEG_TEST_ROLE is not available for this run." \
                 "This usually means the workflow was triggered in a context that" \
                 "cannot access repository Actions secrets (for example, a Dependabot" \
                 "pull_request_target run, or a fork-authored event). Either add the" \
                 "secret under Settings -> Secrets and variables -> Actions (and, for" \
                 "Dependabot, also under Settings -> Secrets and variables ->" \
                 "Dependabot), or restrict this workflow to trusted contexts."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
