name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # The STRANDS_INTEG_TEST_ROLE secret is scoped to the `manual-approval`
    # GitHub Environment. Declaring the environment here ensures the
    # env-scoped secret is injected into the job; without it the secret
    # expands to an empty string and `aws-actions/configure-aws-credentials`
    # fails with "Could not load credentials from any providers".
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is empty or unavailable."
            echo "This usually means one of the following:"
            echo "  1. The job is running for a Dependabot or forked PR via pull_request_target;"
            echo "     repository/environment secrets are not exposed to such runs."
            echo "  2. The secret is not configured at the expected scope (repository or"
            echo "     'manual-approval' environment)."
            echo "  3. The job is missing the 'environment:' key needed to access env-scoped secrets."
            echo "Failing fast instead of waiting for aws-actions/configure-aws-credentials"
            echo "to exhaust 12 retries with an opaque 'Could not load credentials' error."
            exit 1
          fi
      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
