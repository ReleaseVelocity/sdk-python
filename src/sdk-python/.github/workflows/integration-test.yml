name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Gate the job on the `manual-approval` GitHub Environment so that:
    # 1. PRs from forks / Dependabot require an explicit approval before any
    #    code from the PR head is checked out or executed (defense-in-depth
    #    for `pull_request_target`).
    # 2. The `STRANDS_INTEG_TEST_ROLE` (and `STRANDS_TEST_API_KEYS_SECRET_NAME`)
    #    secrets are scoped to this environment and are reliably exposed to
    #    runs originating from `pull_request_target` and `merge_group`.
    #    Without an environment, repository secrets are not available to
    #    Dependabot-triggered runs (Dependabot has a separate secret scope),
    #    which causes `secrets.STRANDS_INTEG_TEST_ROLE` to resolve to an empty
    #    string and the configure-aws-credentials action to fall back to the
    #    default provider chain on a hosted runner (no credentials available).
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
