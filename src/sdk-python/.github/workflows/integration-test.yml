name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Dependabot PRs cannot access regular Actions secrets (they are scoped
    # separately under Dependabot secrets), so STRANDS_INTEG_TEST_ROLE
    # resolves to an empty string and aws-actions/configure-aws-credentials
    # fails after 12 retries. Skip integration tests for Dependabot-authored
    # PRs; dependency bumps do not require AWS-backed integration coverage.
    if: github.actor != 'dependabot[bot]'
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are configured
        # Fail fast (and with a clear message) when the integration-test role
        # secret is missing or empty, rather than waiting ~90s for
        # configure-aws-credentials to exhaust its 12 retries with the
        # opaque "Could not load credentials from any providers" error.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is missing or empty."
            echo "::error::Verify it exists under Settings -> Secrets and variables -> Actions."
            echo "::error::Note: secrets defined under 'Actions' are NOT exposed to workflows triggered by Dependabot PRs;"
            echo "::error::if Dependabot needs them, mirror the secret under Settings -> Secrets and variables -> Dependabot."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
