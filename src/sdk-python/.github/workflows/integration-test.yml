name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Bind to the manual-approval environment so the STRANDS_INTEG_TEST_ROLE
    # secret can be scoped to that environment (and gated behind required
    # reviewers) rather than relying on repo-level secrets that are not
    # exposed to fork pull_request_target runs or to Dependabot-created PRs.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      # Fail fast with a clear, actionable message if the integ-test role
      # secret was not exposed to this run context (e.g., fork PR via
      # pull_request_target, or a Dependabot PR without dependabot secrets
      # configured). Without this, configure-aws-credentials retries 12
      # times over ~3 minutes before producing a generic credentials
      # provider error, which is hard to triage.
      - name: Validate required secrets
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Secret STRANDS_INTEG_TEST_ROLE is not set or not exposed to this run context."
            echo "This typically means one of:"
            echo "  - The PR was opened from a fork via pull_request_target and the secret is not exposed to forks."
            echo "  - The PR was created by Dependabot and the secret is not configured as a Dependabot secret."
            echo "  - The repository secret STRANDS_INTEG_TEST_ROLE was deleted or renamed."
            echo "Add the secret as an environment secret on the 'manual-approval' environment, or as a Dependabot secret if applicable."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
