name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Skip for dependabot PRs because secrets (including STRANDS_INTEG_TEST_ROLE)
    # are not exposed to the dependabot actor under pull_request_target. Without
    # this guard, the Configure Credentials step receives an empty role-to-assume
    # and exhausts all 12 retries with "Could not load credentials from any
    # providers" before failing.
    if: >-
      github.actor != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        # Fail fast with a clear, actionable message when STRANDS_INTEG_TEST_ROLE
        # is missing or empty (e.g. fork PR context, missing/misnamed secret in
        # the targeted environment). This avoids the confusing 12-retry timeout
        # in aws-actions/configure-aws-credentials when role-to-assume resolves
        # to an empty string.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Secret STRANDS_INTEG_TEST_ROLE is not set for this run. This typically means the PR is from a fork or a context that does not have access to repository/environment secrets. Verify the secret exists at the repository or environment level and that the IAM role's trust policy permits this workflow."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
