name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      # Fail fast with a clear, actionable message when the OIDC role secret
      # is not available to this run. This typically happens for
      # `pull_request_target` runs from forked branches and from Dependabot,
      # where org/repo secrets are not exposed. Without this guard,
      # `aws-actions/configure-aws-credentials` would be invoked with an
      # empty `role-to-assume`, exhaust all OIDC retries, and fail with the
      # cryptic "Could not load credentials from any providers".
      - name: Verify integ test role secret is available
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Secret STRANDS_INTEG_TEST_ROLE is not available to this workflow run."
            echo "::error::This is expected for pull_request_target runs from forked or Dependabot branches,"
            echo "::error::because GitHub does not expose repository secrets to untrusted refs."
            echo "::error::To run integration tests for Dependabot PRs, configure a Dependabot secret"
            echo "::error::(Settings -> Secrets and variables -> Dependabot) named STRANDS_INTEG_TEST_ROLE,"
            echo "::error::or merge via the merge_group trigger where secrets are available."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
