name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    # Skip the job for contexts where the STRANDS_INTEG_TEST_ROLE secret is
    # not exposed by GitHub. In those cases the configure-aws-credentials
    # step would otherwise burn 12 retries (~90s) before failing with the
    # opaque message "Could not load credentials from any providers".
    #
    # Secrets are NOT exposed to:
    #   * pull_request_target runs triggered by Dependabot (Dependabot has a
    #     separate secret store under Settings -> Secrets -> Dependabot).
    #   * pull_request_target runs originating from a forked repository (the
    #     head repo is different from the base repo).
    #
    # merge_group runs and same-repo pull_request_target runs (normal
    # contributors) continue to execute the integration test gate.
    if: >-
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request_target' &&
       github.actor != 'dependabot[bot]' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::STRANDS_INTEG_TEST_ROLE secret is empty or not set."
            echo "::error::This usually means the workflow was triggered in a context"
            echo "::error::that does not have access to repository Actions secrets"
            echo "::error::(e.g. a PR from a fork or an untrusted bot account)."
            echo "::error::Configure the secret under Settings -> Secrets and variables"
            echo "::error::-> Actions, and ensure the workflow trigger context can"
            echo "::error::access it."
            exit 1
          fi
          echo "STRANDS_INTEG_TEST_ROLE is configured."

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
