name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    # Skip Dependabot-triggered pull_request_target runs: GitHub does not expose
    # regular Actions/Environment secrets to events triggered by Dependabot, so
    # secrets.STRANDS_INTEG_TEST_ROLE would resolve to an empty string and the
    # configure-aws-credentials step would burn its retry budget before failing
    # with "Could not load credentials from any providers". Dependabot PRs do
    # not need the integ test gate; they are validated by the standard PR build.
    if: ${{ github.actor != 'dependabot[bot]' && github.event.pull_request.user.login != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    # Bind the job to the manual-approval GitHub Environment so that
    # environment-scoped secrets (notably STRANDS_INTEG_TEST_ROLE and
    # STRANDS_TEST_API_KEYS_SECRET_NAME) are injected into the job context.
    # Without this, secrets.STRANDS_INTEG_TEST_ROLE expands to an empty string
    # and aws-actions/configure-aws-credentials cannot perform OIDC AssumeRole.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
