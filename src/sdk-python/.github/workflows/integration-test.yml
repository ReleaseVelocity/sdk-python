name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Skip the job for Dependabot PRs: GitHub does not expose repository Actions
    # secrets to pull_request_target runs triggered by Dependabot, so
    # ${{ secrets.STRANDS_INTEG_TEST_ROLE }} resolves to an empty string and the
    # AWS credentials action fails after exhausting all retries. To re-enable
    # integration tests for Dependabot PRs, mirror STRANDS_INTEG_TEST_ROLE (and
    # STRANDS_TEST_API_KEYS_SECRET_NAME) under
    # Settings -> Secrets and variables -> Dependabot.
    if: github.actor != 'dependabot[bot]' && github.event.pull_request.user.login != 'dependabot[bot]'
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Validate STRANDS_INTEG_TEST_ROLE secret is configured
        # Fail fast with a clear, actionable message when the role secret is
        # missing or not exposed to this run (e.g., a fork-based
        # pull_request_target). Without this guard,
        # aws-actions/configure-aws-credentials retries 12 times over ~1 minute
        # and fails with the opaque message "Could not load credentials from
        # any providers", obscuring the real cause.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error title=Missing required secret::The repository secret STRANDS_INTEG_TEST_ROLE is empty or not exposed to this workflow run."
            echo "::error::This typically means one of:"
            echo "::error:: 1. The secret is not configured at the repo/org level (Settings -> Secrets and variables -> Actions)."
            echo "::error:: 2. The run was triggered from a fork via pull_request_target; GitHub does not pass repo secrets to fork PRs by default."
            echo "::error:: 3. The run was triggered by Dependabot and the secret was not mirrored under Settings -> Secrets and variables -> Dependabot."
            echo "::error::Add or scope the STRANDS_INTEG_TEST_ROLE secret accordingly, then re-run this workflow."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
