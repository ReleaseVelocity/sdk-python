name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Gate this job behind the manual-approval environment so that repository
    # secrets (notably STRANDS_INTEG_TEST_ROLE) are only injected after a
    # required reviewer has approved the run. This is required for
    # pull_request_target triggers from forked or Dependabot PRs, where
    # secrets would otherwise be unavailable and the AWS credential
    # configuration step would fail with an opaque "Could not load
    # credentials from any providers" error after 12 retries.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are present
        # Fail fast with an actionable error if the role secret is missing or
        # empty (e.g. when the secret has not been configured at the
        # repository/organization level, or when the workflow is running in a
        # context that withholds secrets). Without this guard, the next step
        # retries credential validation 12 times before failing with an
        # unhelpful generic message.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is not set or is empty."
            echo "::error::Verify the secret exists at the repository or organization level and is accessible to this workflow context (pull_request_target / merge_group)."
            exit 1
          fi
          echo "STRANDS_INTEG_TEST_ROLE secret is present."

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
