name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is empty or not available to this run."
            echo "::error::This is typically caused by one of the following:"
            echo "::error::  1. The secret is not defined at the repository or organization level."
            echo "::error::  2. The run was triggered by Dependabot via pull_request_target; Dependabot uses a separate secret store (Settings -> Secrets and variables -> Dependabot)."
            echo "::error::  3. The secret is defined under a GitHub Environment, but this job has no 'environment:' binding."
            echo "::error::Fix: ensure STRANDS_INTEG_TEST_ROLE is set as a repo/org Actions secret (full IAM role ARN). For Dependabot PRs, also add it under Settings -> Secrets and variables -> Dependabot."
            exit 1
          fi
          echo "STRANDS_INTEG_TEST_ROLE is present (value masked)."

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
