name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Bind the job to the protected `manual-approval` GitHub Environment so
    # that:
    #   1. `secrets.STRANDS_INTEG_TEST_ROLE` (and any other env-scoped secrets
    #      such as STRANDS_TEST_API_KEYS_SECRET_NAME) actually resolve at
    #      runtime. With pull_request_target — particularly for forks/dependabot
    #      — repository-level secrets are intentionally withheld, which is what
    #      caused the empty `role-to-assume` and the cascading
    #      "Could not load credentials from any providers" failure on
    #      configure-aws-credentials@v6.
    #   2. A maintainer-approval gate runs before any credential-bearing step
    #      executes against an unaudited PR head.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Validate required secrets
        # Fail fast with a clear, actionable message if the OIDC role secret
        # is missing or empty so future regressions surface as a configuration
        # error rather than 12 silent retries inside configure-aws-credentials.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is empty or unset." \
                 "Ensure it is configured on the 'manual-approval' environment" \
                 "(Settings → Environments → manual-approval → Environment secrets)" \
                 "and that this workflow run has been approved."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
