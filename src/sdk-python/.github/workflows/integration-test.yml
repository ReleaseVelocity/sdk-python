name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Pin the job to the `manual-approval` GitHub Environment so environment-scoped
    # secrets (notably STRANDS_INTEG_TEST_ROLE) are injected into this job. Without
    # this key only repository-level secrets are available, which caused
    # `aws-actions/configure-aws-credentials` to receive an empty `role-to-assume`
    # input and fail with "Could not load credentials from any providers".
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      # Defensive guard: fail fast with a clear, actionable message when the
      # STRANDS_INTEG_TEST_ROLE secret is missing or empty, instead of letting
      # `configure-aws-credentials` exhaust 12 retries (~2 minutes) before
      # surfacing an opaque "Could not load credentials" error.
      - name: Verify integ test role secret is configured
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is empty or not exposed to this job."
            echo "::error::Verify it is set under Settings -> Environments -> manual-approval -> Environment secrets,"
            echo "::error::or under repository-level Actions secrets, and contains a full IAM role ARN."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
