name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Bind to a GitHub Environment so environment-scoped secrets (e.g.
    # STRANDS_INTEG_TEST_ROLE) are exposed to pull_request_target runs
    # originating from forks / dependabot branches. Without this, GitHub
    # withholds repo secrets from such runs, causing the secret to render
    # as an empty string and aws-actions/configure-aws-credentials to fail
    # with "Could not load credentials from any providers".
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integ-test role secret is available
        # Fail fast with a clear, actionable message if the secret is empty
        # (e.g. environment binding misconfigured or fork PR without env access).
        # This converts an opaque ~2-minute credential-retry storm into an
        # immediate descriptive failure.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::STRANDS_INTEG_TEST_ROLE secret is not available in this run context."
            echo "::error::This typically means the job's GitHub Environment is misconfigured,"
            echo "::error::or the workflow is triggered by pull_request_target from a fork without environment access."
            exit 1
          fi
          echo "STRANDS_INTEG_TEST_ROLE secret is set."

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
