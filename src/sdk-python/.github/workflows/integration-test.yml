name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # The STRANDS_INTEG_TEST_ROLE secret is defined on the `manual-approval`
    # GitHub Environment. Declaring `environment:` here is required so that
    # environment-scoped secrets are injected into this job. Without it,
    # `secrets.STRANDS_INTEG_TEST_ROLE` expands to an empty string and the
    # `aws-actions/configure-aws-credentials` step fails after 12 retries
    # with "Could not load credentials from any providers".
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are present
        # Fail fast with a clear message if the integ-test role secret is not
        # injected into the job. This avoids the misleading 12-retry credential
        # loop emitted by aws-actions/configure-aws-credentials when
        # role-to-assume resolves to an empty value.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::STRANDS_INTEG_TEST_ROLE secret is not set. Verify it is configured on the 'manual-approval' GitHub Environment (Settings -> Environments -> manual-approval -> Secrets) and that this job declares 'environment: manual-approval'."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
