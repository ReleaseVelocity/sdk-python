name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      # Preflight: fail fast with a clear message if the IAM role secret
      # is missing or unavailable in this trigger context. Without this
      # guard, aws-actions/configure-aws-credentials silently drops the
      # empty role-to-assume input, falls through to the default credential
      # provider chain, retries 12 times, and ends with the opaque error
      # "Could not load credentials from any providers". The most common
      # cause is a pull_request_target run from a fork, where GitHub does
      # not expose repository/organization secrets by design.
      - name: Verify integration-test role secret is available
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Secret STRANDS_INTEG_TEST_ROLE is empty or unavailable in this trigger context."
            echo "::error::This commonly happens for pull_request_target runs from forks, where repository/organization secrets are not exposed."
            echo "::error::Verify the secret exists at the repo/org level and that the workflow trigger context has access to it."
            exit 1
          fi
          echo "STRANDS_INTEG_TEST_ROLE secret is present."

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
