name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Skip on Dependabot PRs: Dependabot has a separate secret store from
    # GitHub Actions, so `secrets.STRANDS_INTEG_TEST_ROLE` is not exposed
    # to those runs. Without the role, the OIDC step retries 12 times
    # (~2.5 minutes) before failing. Skip cleanly instead.
    if: ${{ github.actor != 'dependabot[bot]' && github.event.pull_request.user.login != 'dependabot[bot]' }}
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets
        # Fail fast (in <5s) with a clear error if the integration-test role
        # secret is missing or empty, instead of letting
        # aws-actions/configure-aws-credentials retry OIDC 12 times before
        # giving up with a generic "Could not load credentials" message.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is not set or is empty for this workflow run."
            echo "::error::This usually means the secret is not exposed to this PR (e.g. forked-PR or Dependabot secret scoping),"
            echo "::error::or the secret has not been configured at the repo/org level."
            echo "::error::See repo Settings -> Secrets and variables -> Actions (and 'Dependabot' tab for Dependabot PRs)."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
