name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Dependabot-triggered pull_request_target runs cannot access regular Actions
    # secrets (they use the separate Dependabot secrets store), so
    # secrets.STRANDS_INTEG_TEST_ROLE resolves to an empty string and the
    # configure-aws-credentials step fails with "Could not load credentials from
    # any providers". Skip this job for Dependabot to avoid guaranteed failures.
    if: github.actor != 'dependabot[bot]'
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integration test role secret is available
        run: |
          if [ -z "${{ secrets.STRANDS_INTEG_TEST_ROLE }}" ]; then
            echo "::error::secrets.STRANDS_INTEG_TEST_ROLE is empty. Configure it under repo Settings -> Secrets and variables -> Actions (and Dependabot, if applicable)."
            exit 1
          fi
      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
