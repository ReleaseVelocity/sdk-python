name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Validate required secrets and permissions
        env:
          ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "$ROLE" ]; then
            echo "::error::STRANDS_INTEG_TEST_ROLE secret is missing or empty."
            echo "This is typically caused by one of the following:"
            echo "  - The workflow was triggered from a fork PR via pull_request_target"
            echo "    without the repository's secret-exposure policy permitting it."
            echo "  - The repository secret STRANDS_INTEG_TEST_ROLE has not been"
            echo "    configured with a valid AWS IAM role ARN trusted for GitHub OIDC."
            echo "Failing fast instead of attempting OIDC web-identity assumption,"
            echo "which would otherwise retry 12 times (~55s) before failing opaquely."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
