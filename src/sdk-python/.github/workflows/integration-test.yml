name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Scope the job to the `manual-approval` environment so that
    # `STRANDS_INTEG_TEST_ROLE` (and other integration-test secrets) resolve
    # from environment-scoped secrets. Environment secrets are exposed to
    # `pull_request_target` (including dependabot-originated PRs once the
    # required reviewers approve the deployment), whereas plain repository
    # secrets are not made available to dependabot events.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are configured
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is not set or not exposed to this workflow context."
            echo "::error::Ensure the secret is configured on the 'manual-approval' environment (or as a Dependabot secret for dependabot-originated PRs) and contains a valid IAM role ARN."
            echo "::error::The IAM role's trust policy must also allow the GitHub OIDC provider (token.actions.githubusercontent.com) for repo:${GITHUB_REPOSITORY}:*."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
