name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error title=Missing secret STRANDS_INTEG_TEST_ROLE::The repository secret STRANDS_INTEG_TEST_ROLE is not available to this workflow run."
            echo ""
            echo "This is a deterministic configuration error, not a transient failure."
            echo "A retry of this run will fail identically."
            echo ""
            echo "Common causes and remediations:"
            echo "  1. The PR is from Dependabot. GitHub Actions secrets are NOT shared with Dependabot runs by default."
            echo "     Fix: add STRANDS_INTEG_TEST_ROLE under Settings -> Secrets and variables -> Dependabot."
            echo "  2. The PR is from a forked repository. Repository Actions secrets are not exposed to forks."
            echo "     Fix: only run this job for same-repo PRs, or use a GitHub Environment with required reviewers."
            echo "  3. The secret was renamed, deleted, or scoped to an Environment that this job does not declare."
            echo "     Fix: verify the secret exists at the expected scope (repository or environment)."
            exit 1
          fi
          echo "STRANDS_INTEG_TEST_ROLE is configured."

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
