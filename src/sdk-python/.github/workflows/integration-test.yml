name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Bind to the GitHub Environment that holds the integ-test secrets
    # (STRANDS_INTEG_TEST_ROLE, STRANDS_TEST_API_KEYS_SECRET_NAME). Without
    # this, environment-scoped secrets are not injected into the job and
    # `role-to-assume` resolves to an empty string, causing
    # aws-actions/configure-aws-credentials to fall back to ambient
    # providers and exhaust all retries.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integ-test secret is available
        env:
          ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${ROLE}" ]; then
            echo "::error::STRANDS_INTEG_TEST_ROLE secret is not available in this run context."
            echo "This usually means either (a) the secret is scoped to a GitHub Environment that this job is not bound to, or (b) the run was triggered by a Dependabot/fork PR where repo secrets are not exposed."
            exit 1
          fi
      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
