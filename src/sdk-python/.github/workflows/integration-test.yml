name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Gate on the `manual-approval` environment so that repository secrets
    # (notably STRANDS_INTEG_TEST_ROLE) are delivered to runs triggered by
    # `pull_request_target` from forked PRs only after a maintainer approves
    # the deployment. Without this, GitHub does not expose repository-level
    # secrets to fork-originated `pull_request_target` runs, which causes
    # `aws-actions/configure-aws-credentials` to receive an empty
    # `role-to-assume` and fail after 12 internal retries.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integration test role secret is available
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is not set or not exposed to this run."
            echo "::error::This typically means the workflow was triggered from a forked PR before maintainer approval,"
            echo "::error::or the repository/organization secret is missing or misnamed."
            exit 1
          fi
          echo "STRANDS_INTEG_TEST_ROLE secret is present; proceeding to credential configuration."

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
