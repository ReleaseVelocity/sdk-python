name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Bind the job to the `manual-approval` environment so it can read
    # environment-scoped secrets (notably `STRANDS_INTEG_TEST_ROLE`). Without
    # this, the secret reference resolves to an empty string at runtime and
    # `aws-actions/configure-aws-credentials` falls through to default
    # credential discovery, fails to find credentials on the hosted runner,
    # and exits after retrying.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      # Fail fast with a clear, actionable error if the IAM role secret is
      # missing or empty in the current trigger context (e.g. dependabot/fork
      # PRs that are not allowed to read repo/environment secrets). Without
      # this guard, the failure manifests as an opaque "Could not load
      # credentials from any providers" after ~107s of action-internal
      # retries.
      - name: Verify required secrets
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is empty or not exposed to this run."
            echo "::error::Verify the secret is defined on the 'manual-approval' environment (or as a repository secret)."
            echo "::error::For dependabot/fork pull_request_target runs, confirm GitHub is configured to expose the secret to this trigger context."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
