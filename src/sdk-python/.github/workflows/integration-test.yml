name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integration test secrets are available
        # Fail fast with clear guidance when STRANDS_INTEG_TEST_ROLE is empty.
        # This is the canonical symptom of GitHub withholding repository secrets
        # from Dependabot-triggered pull_request_target runs (Dependabot only sees
        # secrets configured under Settings → Secrets and variables → Dependabot).
        # Without this guard, aws-actions/configure-aws-credentials silently omits
        # role-to-assume and burns ~40s on 12 retries before failing with a
        # confusing "Could not load credentials from any providers" message.
        if: ${{ secrets.STRANDS_INTEG_TEST_ROLE == '' }}
        run: |
          echo "::error::STRANDS_INTEG_TEST_ROLE secret is empty in this run."
          echo "This usually means the workflow was triggered by Dependabot (or a"
          echo "fork PR) via pull_request_target, and repository Actions secrets"
          echo "are not exposed to that execution context."
          echo ""
          echo "Resolution options:"
          echo "  1. If this run is from Dependabot, add STRANDS_INTEG_TEST_ROLE"
          echo "     (and STRANDS_TEST_API_KEYS_SECRET_NAME) under repo Settings →"
          echo "     Secrets and variables → Dependabot."
          echo "  2. If this run is from a regular fork PR, gate this workflow on"
          echo "     a maintainer-applied label (e.g., 'safe-to-test') so it only"
          echo "     runs after review."
          echo "  3. Verify the secret exists at repository scope and is non-empty."
          exit 1
      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
