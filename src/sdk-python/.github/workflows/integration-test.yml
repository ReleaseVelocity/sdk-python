name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Skip for PRs from forks (including dependabot), where required
    # secrets are not available under pull_request_target. Without this
    # gate, configure-aws-credentials receives an empty role-to-assume
    # and exhausts 12 retries with a misleading "Could not load
    # credentials from any providers" error before failing.
    if: >-
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request_target' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are configured
        # Fail fast with an explicit, actionable error if the IAM role
        # secret is missing or empty. This prevents the downstream
        # configure-aws-credentials step from silently expanding an
        # empty value and burning 12 retries on a deterministic config
        # error.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error title=Missing secret::Repository secret STRANDS_INTEG_TEST_ROLE is not set or is empty."
            echo "Expected an IAM role ARN such as arn:aws:iam::<account>:role/<role-name>."
            echo "Check repository (and environment-scoped) secrets, and verify the role's"
            echo "trust policy permits the GitHub OIDC provider for this repository."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
