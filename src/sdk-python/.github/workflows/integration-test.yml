name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # The STRANDS_INTEG_TEST_ROLE / STRANDS_TEST_API_KEYS_SECRET_NAME secrets are
    # scoped to the `manual-approval` GitHub Environment. Without this declaration,
    # those secrets resolve to empty strings at runtime, causing the
    # aws-actions/configure-aws-credentials step to silently fall back to the
    # default credential provider chain and fail with "Could not load credentials
    # from any providers" after exhausting all retries.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      # Defensive guard: fail fast with a clear remediation hint if the role secret
      # is missing or empty, instead of waiting ~2 minutes for the AWS action to
      # exhaust 12 retries against the default credential provider chain.
      - name: Verify AWS role secret is configured
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::secrets.STRANDS_INTEG_TEST_ROLE is not set or is empty."
            echo "::error::Ensure the secret is defined either at the repository level,"
            echo "::error::or on the 'manual-approval' GitHub Environment (which this job targets)."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
