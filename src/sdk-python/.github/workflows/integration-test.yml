name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Skip Dependabot PRs and PRs from forks: in those contexts the repository
    # secrets (e.g. STRANDS_INTEG_TEST_ROLE) and elevated GITHUB_TOKEN
    # permissions (id-token: write) are intentionally withheld by GitHub, so
    # the AWS credentials configuration step cannot succeed and the job fails
    # deterministically with an opaque "Could not load credentials" error
    # after exhausting all retries. Skipping the job in those contexts avoids
    # the false-positive failure while preserving the existing security
    # posture for trusted internal PRs and merge_group events.
    if: >-
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request_target' &&
       github.actor != 'dependabot[bot]' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
