name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Skip on Dependabot PRs and PRs from forks. Dependabot PRs use a separate
    # secret store and PRs from forks do not receive repository secrets in the
    # pull_request_target context, which causes configure-aws-credentials to
    # exhaust its retry budget with "Could not load credentials from any
    # providers". Failing closed here turns a ~99s noisy timeout into an
    # explicit skip. See run 26955302396 for the failure mode.
    if: >-
      github.event_name == 'merge_group' ||
      (github.event_name == 'pull_request_target' &&
       github.actor != 'dependabot[bot]' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    env:
      STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
    steps:
      - name: Verify integration-test role secret is available
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::STRANDS_INTEG_TEST_ROLE secret is empty or unavailable in this context."
            echo "Ensure the secret is configured at the repository level and (for Dependabot PRs) under Settings -> Secrets and variables -> Dependabot."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
