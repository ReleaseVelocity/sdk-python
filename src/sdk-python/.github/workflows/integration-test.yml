name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Bind to the `manual-approval` environment so that environment-scoped
    # secrets (e.g. STRANDS_INTEG_TEST_ROLE) are available to this job.
    # Without this binding, environment secrets resolve to empty strings and
    # `aws-actions/configure-aws-credentials` fails with "Credentials could
    # not be loaded" after exhausting OIDC retries.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integration test role secret is configured
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Secret STRANDS_INTEG_TEST_ROLE is empty or not accessible to this job."
            echo "::error::Verify the secret is defined on the 'manual-approval' environment, and (for Dependabot PRs) also as a Dependabot secret."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
