name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Dependabot-triggered pull_request_target runs do not have access to
    # repository Actions secrets (they require Dependabot secrets, which is a
    # repo-admin configuration). Without secrets.STRANDS_INTEG_TEST_ROLE the
    # OIDC role-to-assume input resolves to an empty string and
    # configure-aws-credentials burns ~2 minutes across 12 retries before
    # failing. Skip the job entirely for Dependabot to avoid the wasted run.
    if: github.actor != 'dependabot[bot]'
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        # Defense-in-depth fail-fast guard. If STRANDS_INTEG_TEST_ROLE is empty
        # for any reason (e.g. a future trigger context that can't see repo
        # secrets), fail with a clear, actionable message instead of letting
        # configure-aws-credentials retry 12 times with the opaque
        # "Could not load credentials from any providers" error.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::secrets.STRANDS_INTEG_TEST_ROLE is empty in this run's context."
            echo "::error::This typically means the workflow was triggered without access to repository Actions secrets"
            echo "::error::(for example, a Dependabot pull_request_target run). Configure the secret under"
            echo "::error::Settings -> Secrets and variables -> Actions (and Dependabot, if needed) and re-run."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
