name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Check integration test secret availability
        id: check-secret
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "secret_available=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Integration tests skipped::The 'STRANDS_INTEG_TEST_ROLE' secret is not available in this workflow context (likely a fork PR or Dependabot PR where repository secrets are not exposed). Skipping integration tests. A maintainer must re-run this workflow from a trusted context to execute the integration tests."
          else
            echo "secret_available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Credentials
        if: steps.check-secret.outputs.secret_available == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        if: steps.check-secret.outputs.secret_available == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        if: steps.check-secret.outputs.secret_available == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        if: steps.check-secret.outputs.secret_available == 'true'
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        if: steps.check-secret.outputs.secret_available == 'true'
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
