name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # The manual-approval GitHub Environment gates this job behind required
    # reviewers (necessary because pull_request_target runs with repo secrets)
    # AND is where the STRANDS_INTEG_TEST_ROLE secret is scoped. Without this
    # declaration, environment-scoped secrets are not injected and the AWS
    # credential configuration step fails with "Could not load credentials from
    # any providers".
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        # Fail fast with a clear message if STRANDS_INTEG_TEST_ROLE is missing or
        # empty, instead of letting aws-actions/configure-aws-credentials retry
        # 12 times over ~2 minutes before emitting an opaque credential-provider
        # error. This guards against future regressions where the secret is
        # rotated, removed, or the environment scoping is misconfigured.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is empty or not set."
            echo "::error::Verify it is configured at the repository or 'manual-approval' environment scope and that this job declares 'environment: manual-approval'."
            exit 1
          fi
          echo "STRANDS_INTEG_TEST_ROLE is configured."

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
