name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        # Fail fast with a clear, actionable message when STRANDS_INTEG_TEST_ROLE
        # is not exposed to this workflow run (e.g. Dependabot PRs that only
        # receive Dependabot secrets, fork PRs where repository secrets are
        # masked out, or after a secret has been rotated/deleted).
        # Without this guard, configure-aws-credentials silently falls back to
        # the default credential provider chain and exhausts 12 OIDC retries
        # over ~50s before failing with an opaque "Could not load credentials
        # from any providers" error.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO_FORK: ${{ github.event.pull_request.head.repo.fork }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::STRANDS_INTEG_TEST_ROLE secret is not available to this workflow run."
            echo "::error::This typically happens for Dependabot PRs (which receive only Dependabot secrets)"
            echo "::error::or for PRs from forks (where repository secrets are not exposed)."
            echo "::error::Actor: ${GITHUB_ACTOR}; Event: ${GITHUB_EVENT_NAME};"
            echo "::error::Head ref: ${PR_HEAD_REF}; Head repo fork: ${PR_HEAD_REPO_FORK}"
            echo "::error::A maintainer must re-run this workflow from a trusted context, or add the"
            echo "::error::secret to the appropriate scope (Settings -> Secrets and variables -> Actions/Dependabot)."
            exit 1
          fi
          echo "STRANDS_INTEG_TEST_ROLE secret is available; proceeding."

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
