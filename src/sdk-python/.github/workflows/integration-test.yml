name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # The STRANDS_INTEG_TEST_ROLE secret is defined as an environment secret on
    # the `manual-approval` GitHub environment, not as a repository secret.
    # Declaring `environment:` here is required for the job to read it; without
    # this, `${{ secrets.STRANDS_INTEG_TEST_ROLE }}` resolves to an empty string
    # and the aws-actions/configure-aws-credentials step retries 12 times with
    # an opaque "Could not load credentials from any providers" error before
    # giving up.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are configured
        # Fail fast with a clear, actionable error if STRANDS_INTEG_TEST_ROLE is
        # missing/empty, instead of letting configure-aws-credentials retry 12
        # times with a generic credential-provider error.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::STRANDS_INTEG_TEST_ROLE secret is not set or is empty."
            echo "Ensure the secret is configured on the 'manual-approval' GitHub environment"
            echo "(Settings -> Environments -> manual-approval -> Environment secrets) or as a"
            echo "repository secret, and that this job declares the environment that owns it."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
