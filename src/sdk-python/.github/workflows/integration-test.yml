name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Dependabot-triggered `pull_request_target` runs receive a separate,
    # restricted secret scope and do NOT have access to standard Actions
    # secrets such as `STRANDS_INTEG_TEST_ROLE`. Without that secret the
    # `configure-aws-credentials` step has no `role-to-assume` input, falls
    # through the default credential provider chain and fails after 12
    # retries (~2 minutes). Skip this job for Dependabot PRs so they fail
    # fast and cleanly. Dependabot PRs don't need to run the AWS-backed
    # integration tests; they will run for human-authored PRs and on
    # merge_group (post-merge) as before.
    if: github.actor != 'dependabot[bot]'
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
