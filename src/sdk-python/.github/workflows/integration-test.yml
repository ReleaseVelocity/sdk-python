name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # The OIDC role ARN is stored as an Environment secret. Without declaring
    # `environment:` here, ${{ secrets.STRANDS_INTEG_TEST_ROLE }} resolves to
    # the empty string and `aws-actions/configure-aws-credentials` fails with
    # `Could not load credentials from any providers`. Selecting the
    # `auto-approve` environment exposes the environment-scoped secrets to
    # this gating job for both `pull_request_target` and `merge_group` events.
    environment: auto-approve
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        # Fail fast with a clear, actionable error message if the role secret
        # is missing from the current event/environment context, instead of
        # bubbling up an opaque "Could not load credentials" error from the
        # AWS credentials action 96 seconds later.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::STRANDS_INTEG_TEST_ROLE secret is empty in this context. Ensure the secret is defined at the repository level or in the 'auto-approve' environment, and that this job declares 'environment: auto-approve'."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
