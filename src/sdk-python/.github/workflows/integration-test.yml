name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    # Skip on Dependabot pull_request_target events: GitHub does not expose
    # repository secrets (e.g. STRANDS_INTEG_TEST_ROLE) or grant
    # `id-token: write` to workflows triggered by Dependabot, so the
    # configure-aws-credentials step would fail deterministically. Maintainers
    # can re-run the integration test on Dependabot PRs by closing/reopening
    # them from a trusted branch, or by promoting them through the
    # `manual-approval` environment.
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Validate required secrets are available
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        run: |
          missing=()
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            missing+=("STRANDS_INTEG_TEST_ROLE")
          fi
          if [ -z "${STRANDS_TEST_API_KEYS_SECRET_NAME}" ]; then
            missing+=("STRANDS_TEST_API_KEYS_SECRET_NAME")
          fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Required secret(s) not available to this workflow run: ${missing[*]}."
            echo "::error::This typically happens for pull_request_target runs from forks or Dependabot, which do not receive repository secrets."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
