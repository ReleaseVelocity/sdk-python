name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Attach to the `manual-approval` environment so environment-scoped
    # secrets (e.g. STRANDS_INTEG_TEST_ROLE) are injected. Without this,
    # `pull_request_target` runs originating from Dependabot and forks
    # don't have access to the secret store containing the OIDC role ARN,
    # which surfaces as `configure-aws-credentials` exhausting all retries
    # with "Could not load credentials from any providers".
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      # Defensive guard: fail fast with a clear diagnostic when the secret
      # is missing for the current execution context, instead of waiting
      # ~70s for `configure-aws-credentials` to exhaust 12 retries.
      - name: Verify integ-test role secret is available
        if: ${{ secrets.STRANDS_INTEG_TEST_ROLE == '' }}
        run: |
          echo "::error::Missing STRANDS_INTEG_TEST_ROLE secret for this trigger context."
          echo "Ensure the secret is configured on the 'manual-approval' environment,"
          echo "and (for Dependabot-triggered runs) under Settings -> Secrets and variables -> Dependabot."
          exit 1

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
