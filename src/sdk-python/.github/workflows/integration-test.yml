name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret 'STRANDS_INTEG_TEST_ROLE' is not available in this run's context."
            echo "::error::This commonly happens for Dependabot-triggered pull_request_target runs, which do not"
            echo "::error::inherit repository Actions secrets by default. Add STRANDS_INTEG_TEST_ROLE (and"
            echo "::error::STRANDS_TEST_API_KEYS_SECRET_NAME) under Settings -> Secrets and variables -> Dependabot,"
            echo "::error::or share the org-level secret with Dependabot. Failing fast to avoid a 110s retry loop"
            echo "::error::inside aws-actions/configure-aws-credentials."
            exit 1
          fi
          echo "STRANDS_INTEG_TEST_ROLE secret is present."

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
