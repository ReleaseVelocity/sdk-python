name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are present
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is not set or is empty for this workflow run."
            echo "::error::Without this secret the AWS credential provider chain has nothing to load and the run will fail after ~2.5 minutes of retries."
            echo "::error::If this is a Dependabot-triggered run, ensure the secret is also added under Settings -> Secrets and variables -> Dependabot. For pull_request_target from forks, verify org/repo policies expose the secret to this trigger."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
