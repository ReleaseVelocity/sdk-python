name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Bind the job to the existing 'manual-approval' GitHub Environment so
    # that environment-scoped secrets (STRANDS_INTEG_TEST_ROLE,
    # STRANDS_TEST_API_KEYS_SECRET_NAME) are injected into the job context.
    # Without this binding, secrets.STRANDS_INTEG_TEST_ROLE evaluates to an
    # empty string at runtime (especially for pull_request_target runs
    # triggered on Dependabot branches, which use a separate secret scope),
    # causing aws-actions/configure-aws-credentials to fail all retries with
    # 'Could not load credentials from any providers'.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are present
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is not set or is empty."
            echo "::error::Ensure the secret is configured on the 'manual-approval' GitHub Environment"
            echo "::error::(Settings -> Environments -> manual-approval -> Environment secrets)."
            echo "::error::For Dependabot-triggered runs, the secret must also be available in the Dependabot scope"
            echo "::error::or the workflow must be guarded with 'if: github.actor != \"dependabot[bot]\"'."
            exit 1
          fi
          echo "STRANDS_INTEG_TEST_ROLE is present (value masked)."

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
