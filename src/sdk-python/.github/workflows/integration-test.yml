name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Bind this job to the `manual-approval` environment so that environment-scoped
    # secrets (notably STRANDS_INTEG_TEST_ROLE) are injected into the job context.
    # Without this binding, secrets defined at the environment level resolve to
    # empty strings even though a deployment to the environment is recorded,
    # which causes aws-actions/configure-aws-credentials to receive an empty
    # `role-to-assume` and fail OIDC role assumption.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify required secrets are available
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is empty or unavailable in this run's context."
            echo "::error::This typically happens when the secret is defined at an environment scope but the job is not bound to that environment, or when secrets are not exposed to the current event (e.g., forked-PR / Dependabot pull_request_target)."
            echo "::error::Verify the secret exists at the repository or 'manual-approval' environment level, that this job declares the matching 'environment:' key, and that the IAM role's OIDC trust policy permits this repository and event."
            exit 1
          fi
      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
