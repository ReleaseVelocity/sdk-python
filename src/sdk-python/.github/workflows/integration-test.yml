name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Skip for Dependabot PRs: regular Actions secrets (including
    # STRANDS_INTEG_TEST_ROLE) are not exposed to dependabot-triggered
    # pull_request_target runs, so the configure-aws-credentials step
    # below would fail with an opaque 12-retry credentials timeout.
    # Skip for PRs from forks for the same reason and for safety
    # (pull_request_target runs in the base repo's privileged context).
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name != 'pull_request_target' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integration-test role secret is configured
        # Fail fast with an actionable error if the role secret is empty
        # (e.g., missing/renamed repo secret, or run in an event context
        # where the secret is not exposed). Without this guard,
        # aws-actions/configure-aws-credentials retries 12 times before
        # producing a misleading "Could not load credentials from any
        # providers" error.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Required secret STRANDS_INTEG_TEST_ROLE is empty or unavailable in this event context (event=${{ github.event_name }}, actor=${{ github.actor }})."
            echo "::error::Verify the secret exists under Settings -> Secrets and variables -> Actions and is accessible to this workflow trigger."
            exit 1
          fi
          echo "STRANDS_INTEG_TEST_ROLE is set; proceeding to configure credentials."

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
