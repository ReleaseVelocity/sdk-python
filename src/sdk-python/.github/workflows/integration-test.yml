name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    # Skip integration tests for Dependabot PRs. Dependabot-triggered
    # `pull_request_target` runs do NOT receive Actions secrets (Dependabot uses
    # its own secret scope), so `secrets.STRANDS_INTEG_TEST_ROLE` resolves to an
    # empty string and the AWS credential bootstrap fails with no useful signal.
    # See: https://docs.github.com/en/code-security/dependabot/working-with-dependabot/automating-dependabot-with-github-actions#accessing-secrets
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integration test role secret is configured
        # Fail fast with a clear, actionable message instead of letting the AWS
        # credentials action exhaust 12 retries (~100s) when the secret is
        # missing or empty.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::Repository secret STRANDS_INTEG_TEST_ROLE is not set or is empty for this run."
            echo "::error::Configure the IAM role ARN under Settings -> Secrets and variables -> Actions."
            echo "::error::For Dependabot PRs, set it under Settings -> Secrets and variables -> Dependabot."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
