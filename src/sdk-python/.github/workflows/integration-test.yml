name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Bind the job to the `manual-approval` GitHub Environment so that
    # environment-scoped secrets (notably STRANDS_INTEG_TEST_ROLE) are exposed
    # to this run. Repository-scoped secrets are NOT available to
    # `pull_request_target` runs triggered by forks or by Dependabot, which is
    # why earlier runs saw `role-to-assume` resolve to an empty string and the
    # AWS credentials step failed with "Could not load credentials from any
    # providers". Pairing this with the environment's required reviewer rule
    # keeps untrusted PRs from automatically gaining AWS access.
    environment: manual-approval
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integration test role secret is available
        # Fail fast (with a clear message) if the secret didn't resolve in this
        # context, instead of letting `configure-aws-credentials` retry 12
        # times and surface a misleading "Could not load credentials" error.
        env:
          STRANDS_INTEG_TEST_ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${STRANDS_INTEG_TEST_ROLE}" ]; then
            echo "::error::STRANDS_INTEG_TEST_ROLE secret is not available in this run's context."
            echo "This typically happens for pull_request_target runs from forks or Dependabot when the secret is not defined on the 'manual-approval' environment (or under Settings -> Secrets and variables -> Dependabot)."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
