name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Skip integration tests for Dependabot-originated PRs. Dependabot runs with
    # a read-only GITHUB_TOKEN and does not have access to regular repository
    # Actions secrets (only Dependabot secrets), so `secrets.STRANDS_INTEG_TEST_ROLE`
    # resolves to an empty string and `aws-actions/configure-aws-credentials` then
    # fails after 12 retries with "Could not load credentials from any providers".
    # If/when the required secrets are added to Dependabot secrets, this guard
    # can be relaxed.
    if: github.actor != 'dependabot[bot]' && github.event.pull_request.user.login != 'dependabot[bot]'
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Validate required secrets
        env:
          ROLE: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "$ROLE" ]; then
            echo "::error::Missing STRANDS_INTEG_TEST_ROLE secret. This is expected for Dependabot-originated pull_request_target runs because GitHub does not expose regular repository secrets to Dependabot. Add the secret under Settings → Secrets and variables → Dependabot, or restrict this workflow to non-Dependabot PRs."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
