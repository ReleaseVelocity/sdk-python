name: Secure Integration test

on:
  pull_request_target:
    branches: [main, 'base-*']
  merge_group:
    types: [checks_requested]

jobs:
  check-access-and-checkout:
    runs-on: ubuntu-latest
    # Dependabot-triggered pull_request_target runs do not have access to
    # regular Actions secrets (Dependabot uses a separate secret store), so
    # `secrets.STRANDS_INTEG_TEST_ROLE` resolves to an empty string and the
    # `aws-actions/configure-aws-credentials` step deterministically fails
    # after a 2-minute retry loop. Running pull_request_target with elevated
    # secrets against Dependabot-supplied code is also security-sensitive,
    # so skip the job for Dependabot actors.
    if: github.actor != 'dependabot[bot]'
    permissions:
      id-token: write
      pull-requests: read
      contents: read
    steps:
      - name: Verify integ-test role secret is configured
        # Fail fast with an actionable message if the secret is missing
        # (e.g. rotated/deleted) instead of letting configure-aws-credentials
        # spin through 12 retry attempts before erroring out.
        env:
          ROLE_TO_ASSUME: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
        run: |
          if [ -z "${ROLE_TO_ASSUME}" ]; then
            echo "::error::secrets.STRANDS_INTEG_TEST_ROLE is empty. Configure the repository secret (and Dependabot secrets if applicable) before running integration tests."
            exit 1
          fi

      - name: Configure Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
         role-to-assume: ${{ secrets.STRANDS_INTEG_TEST_ROLE }}
         aws-region: us-east-1
         mask-aws-account-id: true

      - name: Checkout head commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --no-cache-dir hatch 'virtualenv<21'
      - name: Run integration tests
        env:
          AWS_REGION: us-east-1
          AWS_REGION_NAME: us-east-1
          STRANDS_TEST_API_KEYS_SECRET_NAME: ${{ secrets.STRANDS_TEST_API_KEYS_SECRET_NAME }}
        id: tests
        run: |
          hatch test tests_integ
