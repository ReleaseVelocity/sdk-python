services:
  sdk-python:
    container_name: sdk-python
    build:
      context: ..
      dockerfile: phantom-stack/Dockerfile
    image: sdk-python:dev
    environment:
      # Provide deterministic AWS defaults so moto-based tests have a region.
      AWS_DEFAULT_REGION: us-west-2
      SETUPTOOLS_SCM_PRETEND_VERSION: "1.0.0"
    working_dir: /app
    command: ["sleep", "infinity"]
